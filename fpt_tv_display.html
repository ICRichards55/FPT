<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FPT Live Board</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Barlow Condensed',sans-serif}
.board{width:100vw;height:100vh;position:relative}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease;overflow:hidden;display:flex;flex-direction:column}
.slide.active{opacity:1}
.slide-dark{background:#111213;color:#fff}
.slide-light{background:#f4f3ef;color:#111}
svg.brush{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* LOGO — all slides: top right, below wave banner */
.slide-logo{position:absolute;z-index:10;right:3%;top:14%}

/* WELCOME */
.welcome-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:5vw 6vw}
.welcome-title{font-family:'Permanent Marker',cursive;font-size:clamp(68px,9.7vw,186px);line-height:.88;color:#fff;text-transform:uppercase;letter-spacing:-2px}
.welcome-tag-wrap{text-align:right;padding-right:2vw;margin-top:3vh}
.welcome-motto{font-family:'Permanent Marker',cursive;font-size:clamp(28px,4.43vw,85px);color:#fff;letter-spacing:2px;text-transform:uppercase}
.welcome-sub{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:rgba(255,255,255,.65);font-size:clamp(14px,2.5vw,48px);letter-spacing:4px;text-transform:uppercase;margin-top:.8vh}

/* LEADERBOARD */
.lb-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 14vh}
.lb-ex-name.lb-title-main{font-size:clamp(60px,9.64vw,185px)}
.lb-ex-name{font-family:'Permanent Marker',cursive;font-size:clamp(60px,10.94vw,210px);line-height:.82;text-transform:uppercase;color:#111;flex-shrink:0}
.lb-columns{display:grid;grid-template-columns:1fr 1fr;gap:3vw;flex:1;padding-top:2vh;border-top:3px solid #222;margin-top:.7vh}
.lb-columns>div{display:flex;flex-direction:column}
.ch-rows-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-start}
.lb-rows-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-start}
.lb-col-head{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,1.8vw,28px);font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:1.2vh;padding-bottom:.8vh;border-bottom:2px solid #ccc}
.lb-row{display:flex;align-items:center;gap:0.7vw;padding:.12vh 0;border-bottom:1px solid rgba(0,0,0,.08);height:20%;flex-shrink:0;container-type:size}
.lb-row:last-child{border-bottom:none}
.lb-name span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;display:block}
.lb-rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(24px,98cqh,150px);min-width:clamp(48px,6vw,90px);color:#111;line-height:1;flex-shrink:0}
.lb-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:clamp(18px,min(15cqw,85cqh),100px);flex:1;min-width:0;color:#111;line-height:1.1}
/* BigBoys has 3 narrower columns (vs Leaderboard's 2 wider ones) sharing this same row
   markup — the shared formula above is calibrated for Leaderboard's wider columns and was
   never actually width-tested for this narrower case. Dedicated, measured-safe override. */
/* Big Boys rebalance (measured w/ real Barlow Condensed, July 2026): rank+score shrink
   from the inherited 98cqh to 72cqh, freeing ~81px/row width; name grows into it.
   Name is height-bound at 74cqh (~51px @1080p, +19% vs old 43px); 9.4cqw width guard
   verified against reclaimed span width w/ >25px margin; ellipsis remains final guard. */
.lb-columns-3 .lb-rank{font-size:clamp(20px,72cqh,100px);min-width:clamp(40px,3.2vw,124px)}
.lb-columns-3 .lb-score{font-size:clamp(20px,72cqh,100px)}
.lb-columns-3 .lb-name{font-size:clamp(16px,min(9.4cqw,74cqh),104px)}
.lb-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(22px,98cqh,140px);color:#111;line-height:1;flex-shrink:0;white-space:nowrap}
.lb-empty{font-size:clamp(14px,1.6vw,26px);color:#aaa;padding:2vh 0;font-style:italic;flex:1;display:flex;align-items:center;width:100%}

/* MONTHLY PRS */
.pr-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 14vh}
.pr-title{font-family:'Permanent Marker',cursive;font-size:clamp(60px,8.33vw,320px);line-height:.85;text-transform:uppercase;color:#111;flex-shrink:0;margin-bottom:2vh}
.pr-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:2vw;flex:1}
.pr-col{border:2.5px solid #222;border-radius:16px;padding:1.8vh 2vw;display:flex;flex-direction:column}
.pr-col-head{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.6vw,42px);font-weight:900;letter-spacing:2px;text-transform:uppercase;text-align:center;color:#111;padding-bottom:1.2vh;border-bottom:2px solid #222;margin-bottom:1.2vh;flex-shrink:0}
.pr-entries-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-start}
.pr-entry{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#111;padding:.3vh 0;border-bottom:1px solid rgba(0,0,0,.1);display:flex;justify-content:space-between;gap:1vw;flex-shrink:0;container-type:size}
.pr-entry:last-child{border-bottom:none}
.pr-ath-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:clamp(14px,min(9cqw,45cqh),34px)}
.pr-ath-val{font-weight:900;white-space:nowrap;color:#333;font-size:clamp(13px,40cqh,30px)}
.pr-empty{font-size:clamp(16px,2vw,28px);color:#aaa;font-style:italic;padding:1vh 0}

/* SHREDMILL */
.sh-body{position:relative;z-index:2;flex:1;display:flex;align-items:stretch;padding:14vh 4vw 3vw}
.sh-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:3vw}
.sh-title{font-family:'Permanent Marker',cursive;font-size:clamp(60px,9.5vw,155px);line-height:.85;text-transform:uppercase;color:#111}
.sh-right{width:42%;display:flex;flex-direction:column;gap:2vh}
.sh-vid{flex:1;background:#222;border-radius:12px;overflow:hidden;min-height:0;position:relative}
.sh-vid video{width:100%;height:100%;object-fit:cover}
.sh-vid-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#555}
.sh-bullets{flex-shrink:0}
.sh-bullet{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.2vw,36px);font-weight:600;color:#111;padding:.4vh 0;display:flex;align-items:center;gap:12px}
.sh-bullet::before{content:'';width:10px;height:10px;border-radius:50%;background:#111;flex-shrink:0}

/* CONGRATS */
.cg-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 14vh;overflow:visible}
.cg-word{font-family:'Permanent Marker',cursive;font-size:clamp(80px,16vw,260px);line-height:.82;color:#fff;text-transform:uppercase;white-space:nowrap;margin-left:-1vw;margin-bottom:2.5vh;flex-shrink:0}
.cg-right{flex:1;display:flex;flex-direction:column;gap:1.4vh;justify-content:center;padding-left:0.5vw}
.cg-item{border-left:4px solid #fff;padding-left:2vw}
.cg-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:calc(clamp(30px,6.5vw,104px) * var(--cg-scale,1));color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.cg-ach{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:calc(clamp(24px,5vw,84px) * var(--cg-scale,1));color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.cg-empty{color:rgba(255,255,255,.3);font-size:clamp(14px,1.6vw,26px);font-style:italic}

/* NAV */
.nav-dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:200}
.nd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.3s;cursor:pointer}
.nd.on{background:rgba(255,255,255,.85)}
.prog-bar{position:fixed;bottom:0;left:0;height:3px;background:rgba(255,255,255,.5);z-index:300}
/* BIRTHDAYS (dark slide) */
.bd-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 14vh}
.bd-title{font-family:'Permanent Marker',cursive;font-size:clamp(70px,13vw,210px);line-height:.82;color:#fff;text-transform:uppercase;margin-bottom:.4vh;flex-shrink:0}
.bd-sub{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(18px,2.6vw,44px);letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:3vh;flex-shrink:0}
.bd-list{display:grid;grid-template-columns:repeat(2,1fr);gap:.6vh 4vw;align-content:start;flex:1}
.bd-item{display:flex;justify-content:space-between;align-items:baseline;gap:1vw;padding:.3vh 0;border-bottom:1px solid rgba(255,255,255,.15)}
.bd-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(20px,3.1vw,53px);color:#fff;letter-spacing:1px;text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bd-date{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:clamp(15px,2.3vw,39px);color:rgba(255,255,255,.6);white-space:nowrap;letter-spacing:1px;text-transform:uppercase}
.bd-today .bd-name,.bd-today .bd-date{color:#ffd34d}
/* MONTHLY CHALLENGE (light slide) */
.ch-row{display:flex;align-items:center;gap:1vw;padding:.12vh 0;border-bottom:1px solid rgba(0,0,0,.08);flex-shrink:0;container-type:size}
.ch-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:#111;line-height:1.15;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ch-rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;color:#111;line-height:1;flex-shrink:0}
.ch-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;color:#111;line-height:1;flex-shrink:0;white-space:nowrap}
.ch-cols-1 .ch-rank{font-size:clamp(24px,65cqh,105px);min-width:clamp(48px,6vw,90px)}
.ch-cols-1 .ch-name{font-size:clamp(18px,min(10.5cqw,42cqh),80px)}
.ch-cols-1 .ch-score{font-size:clamp(22px,58cqh,95px)}
.ch-cols-2 .ch-rank{font-size:clamp(20px,50cqh,68px);min-width:clamp(38px,3.4vw,60px)}
.ch-cols-2 .ch-name{font-size:clamp(15px,min(7.5cqw,32cqh),55px)}
.ch-cols-2 .ch-score{font-size:clamp(17px,44cqh,63px)}
.ch-cols-3 .ch-rank{font-size:clamp(17px,47cqh,52px);min-width:clamp(30px,2.4vw,44px)}
.ch-cols-3 .ch-name{font-size:clamp(13px,min(6cqw,30cqh),42px)}
.ch-cols-3 .ch-score{font-size:clamp(14px,42cqh,47px)}
</style>
</head>
<body>
<div class="board" id="board"></div>
<div class="nav-dots" id="dots"></div>
<div class="prog-bar" id="prog"></div>
<script>
window._API_URL='https://script.google.com/macros/s/AKfycbwirWQw0-hVSwIwVl6RCWcclgRNKia7awlfUzImilUiKjNKtSapuCueOaTwWgTlJ6Uk/exec';
const LOGO='/fpt_logo_dark.png';
const LOGO_WHITE='/fpt_logo.webp'; // used on dark-background slides — dark logo is invisible there
const SHOW_CHALLENGE_SLIDE=true; // TV Monthly Challenge slide — enabled after confirming with Chris
const SHREDMILL_URL='';
let SLIDE_TIMES=[10,12,12,12,12,12,12,14,12,11,13];
let TOTAL_SLIDES=11;
const EX=[
  {id:'fly',  name:'10-10 Fly',  lower:true},
  {id:'broad',name:'Broad Jump', lower:false},
  {id:'vert', name:'Skyhook Approach Jump',lower:false},
];

// ── FORMATTERS ──────────────────────────────────────────────────
function fmtFly(v){return v!=null?v.toFixed(3):'—';}
function fmtBroad(v){if(v==null)return'—';return`${Math.floor(v/12)}'${Math.round(v%12)}`;}
function fmtVert(v){return v!=null?v.toFixed(3):'—';}
function fmtScore(id,v){return id==='fly'?fmtFly(v):id==='broad'?fmtBroad(v):fmtVert(v);}
function rankStr(n){return String(n).padStart(2,'0');}
function getMonthName(){return new Date().toLocaleString('en-US',{month:'long'}).toUpperCase();}

// ── DATA — single best individual attempt ───────────────────────
function getAthletesForGender(gender){
  const p=state.profiles||{};
  return Object.entries(p)
    .filter(([_,prof])=>prof.gender===gender&&!prof.inactive)
    .map(([name])=>name);
}

function getPRs(entries,exId){
  // Single best individual attempt per athlete
  const byAth={};
  entries.filter(e=>e.exercise===exId).forEach(e=>{
    const v=exId==='broad'?e.total:e.value;
    if(v==null||isNaN(v))return;
    if(!byAth[e.athlete]||(exId==='fly'?v<byAth[e.athlete]:v>byAth[e.athlete]))
      byAth[e.athlete]=v;
  });
  return Object.entries(byAth)
    .map(([a,v])=>{return{athlete:a,v};  })
    .sort((a,b)=>exId==='fly'?a.v-b.v:b.v-a.v);
}

function getPRsGender(entries,exId,gender){
  const athletes=getAthletesForGender(gender);
  return getPRs(entries.filter(e=>athletes.includes(e.athlete)),exId);
}

function getMonthlyPRsGender(entries,exId,gender){
  const athletes=getAthletesForGender(gender);
  const ms=new Date().toISOString().slice(0,7);
  return getPRs(entries.filter(e=>athletes.includes(e.athlete)&&e.date.startsWith(ms)),exId);
}

function getMonthlyImprovers(entries,exId){
  const ms=new Date().toISOString().slice(0,7);
  const thisMonth=entries.filter(e=>e.exercise===exId&&e.date.startsWith(ms));
  const before=entries.filter(e=>e.exercise===exId&&!e.date.startsWith(ms));
  const result=[];
  [...new Set(thisMonth.map(e=>e.athlete))].forEach(ath=>{
    const mVals=thisMonth.filter(e=>e.athlete===ath).map(e=>exId==='broad'?e.total:e.value).filter(v=>v!=null);
    const bVals=before.filter(e=>e.athlete===ath).map(e=>exId==='broad'?e.total:e.value).filter(v=>v!=null);
    if(!mVals.length)return;
    const mBest=exId==='fly'?Math.min(...mVals):Math.max(...mVals);
    const bBest=bVals.length?(exId==='fly'?Math.min(...bVals):Math.max(...bVals)):null;
    if(bBest==null||(exId==='fly'?mBest<bBest:mBest>bBest))
      result.push({athlete:ath,prev:bBest,curr:mBest});
  });
  return result.sort((a,b)=>exId==='fly'?a.curr-b.curr:b.curr-a.curr);
}

function activeAchs(){
  const now=new Date();
  return(state.achievements||[]).filter(a=>{
    if(a.archived)return false;
    const exp=new Date(a.dateAdded+'T12:00:00');
    exp.setDate(exp.getDate()+a.durationWeeks*7);
    return exp>now;
  });
}

// ── AUTO-DETECTED PRs / GYM RECORDS FOR CONGRATS ────────────────
// Computed live from entries each render — no stored state, no explicit "take it down"
// logic needed. A gym record simply stops appearing on its own once someone else becomes
// the current #1 (since we always look up who holds #1 *right now*, not a saved snapshot).
const AUTO_PR_EXERCISES=['fly','broad','vert']; // core 3 the TV already tracks elsewhere
const AUTO_PR_DAYS=7;
const AUTO_GYM_RECORD_DAYS=28;
// Tested against the slide's actual text-scaling floor (readability limit, not arbitrary):
// 5 items renders safely with real margin; 6 is technically survivable but razor-thin;
// 7+ genuinely overflows the slide. 5 is the real, measured ceiling, not a guess.
const CONGRATS_ROOM_CAP=5;

function _daysAgo(dateStr){
  const then=new Date(dateStr+'T12:00:00');
  return(new Date()-then)/86400000;
}
function _findPRDate(entries,athlete,exId,prValue){
  const matches=entries.filter(e=>e.athlete===athlete&&e.exercise===exId&&(exId==='broad'?e.total:e.value)===prValue);
  if(!matches.length)return null;
  return matches.map(e=>e.date).sort()[0];
}
function getAutoAchievements(entries){
  const result=[];
  const alreadyCovered=new Set(activeAchs().map(a=>a.athlete)); // don't duplicate an athlete already manually congratulated
  ['male','female'].forEach(gender=>{
    AUTO_PR_EXERCISES.forEach(exId=>{
      const ranked=getPRsGender(entries,exId,gender);
      if(!ranked.length)return;
      const top=ranked[0];
      if(!alreadyCovered.has(top.athlete)){
        const date=_findPRDate(entries,top.athlete,exId,top.v);
        if(date&&_daysAgo(date)<=AUTO_GYM_RECORD_DAYS)
          result.push({athlete:top.athlete,exId,v:top.v,type:'gym-record',date});
      }
      ranked.slice(1).forEach(r=>{
        if(alreadyCovered.has(r.athlete))return;
        const date=_findPRDate(entries,r.athlete,exId,r.v);
        if(date&&_daysAgo(date)<=AUTO_PR_DAYS)
          result.push({athlete:r.athlete,exId,v:r.v,type:'pr',date});
      });
    });
  });
  // one auto-achievement per athlete: prefer gym-record over plain PR, then most recent
  const byAthlete={};
  result.forEach(r=>{
    const existing=byAthlete[r.athlete];
    if(!existing||(r.type==='gym-record'&&existing.type!=='gym-record')||(r.type===existing.type&&r.date>existing.date))
      byAthlete[r.athlete]=r;
  });
  return Object.values(byAthlete).sort((a,b)=>{
    if((a.type==='gym-record')!==(b.type==='gym-record'))return a.type==='gym-record'?-1:1;
    return b.date.localeCompare(a.date);
  });
}
function _exerciseDisplayName(exId){
  const ex=EX.find(e=>e.id===exId);
  return ex?ex.name:exId;
}
function autoAchievementsAsRecords(entries){
  const room=CONGRATS_ROOM_CAP-activeAchs().length;
  if(room<=0)return[];
  return getAutoAchievements(entries).slice(0,room).map(a=>({
    id:'auto_'+a.athlete+'_'+a.exId,
    athlete:a.athlete,
    achievement:(a.type==='gym-record'?'Gym Record — ':'New PR — ')+_exerciseDisplayName(a.exId)+' ('+fmtScore(a.exId,a.v)+')',
    dateAdded:a.date,
    durationWeeks:a.type==='gym-record'?4:1,
    archived:false
  }));
}

// ── BRUSHSTROKES ─────────────────────────────────────────────────
function whiteBrush(){
  return`<svg class="brush" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <path d="M-80,0 C120,-15 380,38 600,12 C820,-14 1060,42 1290,16 C1520,-10 1730,32 2000,5 L2000,100 C1700,124 1460,76 1230,100 C1000,124 780,68 550,94 C320,120 70,76 -80,94Z" fill="white" opacity=".82"/>
    <path d="M500,0 C720,-22 980,18 1200,-6 C1420,-30 1680,14 2000,-8 L2000,52 C1700,72 1440,32 1210,56 C980,80 730,38 500,56Z" fill="white" opacity=".52"/>
    <path d="M-80,980 C180,960 440,1000 700,985 C920,972 1100,1005 1320,992 C1550,979 1780,1010 2000,996 L2000,1080 L-80,1080Z" fill="white" opacity=".78"/>
    <path d="M0,1005 C200,980 420,1015 660,1000 C840,988 1000,1010 1140,1003 C1320,997 1500,1020 1700,1006 C1850,997 1950,1010 2000,1003 L2000,1080 L0,1080Z" fill="white" opacity=".5"/>
  </svg>`;
}
function blackBrush(){
  return`<svg class="brush" viewBox="0 0 1920 1080" preserveAspectRatio="none">
    <path d="M-80,0 C120,-18 380,40 600,12 C820,-16 1060,42 1290,16 C1520,-10 1730,34 2000,6 L2000,108 C1700,130 1460,80 1230,104 C1000,128 780,72 550,98 C320,124 70,80 -80,98Z" fill="black" opacity=".86"/>
    <path d="M1100,-6 C1320,-28 1580,16 1820,-8 L2000,-16 L2000,62 C1770,82 1520,38 1280,64 C1060,90 880,46 730,56Z" fill="black" opacity=".52"/>
    <path d="M-80,982 C200,960 460,1002 720,988 C920,976 1090,1007 1320,994 C1550,981 1780,1012 2000,998 L2000,1080 L-80,1080Z" fill="black" opacity=".80"/>
    <path d="M0,1004 C200,980 400,1016 640,1002 C820,990 970,1010 1120,1004 C1320,998 1500,1020 1700,1008 C1850,999 1950,1012 2000,1005 L2000,1080 L0,1080Z" fill="black" opacity=".52"/>
  </svg>`;
}

// ── SLIDE BUILDERS ───────────────────────────────────────────────
function buildWelcome(){
  return`<div class="slide slide-dark" id="s0">
    ${whiteBrush()}
    <img class="slide-logo" src="${LOGO_WHITE}" alt="FPT" style="height:clamp(95px,17.19vw,660px)"/>
    <div class="welcome-body">
      <div class="welcome-title">Frye<br>Performance<br>Training</div>
      <div class="welcome-tag-wrap">
        <div class="welcome-motto">Attitude – Consistency – Effort</div>
        <div class="welcome-sub">Welcome to the best hour of your day</div>
      </div>
    </div>
  </div>`;
}

function getAthleteSchool(name){
  const p=(state.profiles||{})[name]||{};
  const today=new Date();
  if(p.hsGradYear){
    const gradDate=new Date(parseInt(p.hsGradYear),5,1);
    if(today<gradDate)return p.highSchool||'';
  }
  return p.college||p.highSchool||'';
}
function getSchoolLogo(name){
  const school=getAthleteSchool(name);
  if(!school)return null;
  return (state.schoolLogos||{})[school]||null;
}

function lbRowsEx(arr,exId){
  if(!arr.length)return`<div class="lb-rows-wrap"><div class="lb-empty">No entries yet</div></div>`;
  let rank=1,html='';
  arr.slice(0,5).forEach((r,i)=>{
    if(i>0&&arr[i].v!==arr[i-1].v)rank=i+1;
    const logo_=getSchoolLogo(r.athlete);
    html+=`<div class="lb-row">
      <div class="lb-rank">${rankStr(rank)}</div>
      <div class="lb-name" style="display:flex;align-items:center;gap:8px">${logo_?'<img src="'+logo_+'" style="height:clamp(28px,92cqh,150px);width:auto;object-fit:contain;flex-shrink:0" onerror="this.style.display=&apos;none&apos;"/>':''}<span>${r.athlete}</span></div>
      <div class="lb-score">${fmtScore(exId,r.v)}</div>
    </div>`;
  });
  return`<div class="lb-rows-wrap">${html}</div>`;
}

function buildLeaderboard(slideId,ex,gender,entries){
  const monthly=getMonthlyPRsGender(entries,ex.id,gender);
  const allTime=getPRsGender(entries,ex.id,gender);
  const mon=getMonthName();
  return`<div class="slide slide-light" id="s${slideId}">
    ${blackBrush()}
    <img class="slide-logo" src="${LOGO}" alt="FPT" style="height:clamp(84px,14.7vw,245px)"/>
    <div class="lb-body">
      <div class="lb-ex-name lb-title-main">${ex.name}</div>
      <div class="lb-columns">
        <div>
          <div class="lb-col-head">${mon} Leaderboard</div>
          ${lbRowsEx(monthly,ex.id)}
        </div>
        <div>
          <div class="lb-col-head">All-Time PR</div>
          ${lbRowsEx(allTime,ex.id)}
        </div>
      </div>
    </div>
  </div>`;
}

function getBigBoys(entries, exId){
  // Athletes with OL or DL anywhere in their positions field (case-insensitive)
  const p = state.profiles || {};
  const bigBoyNames = Object.entries(p)
    .filter(([_, prof]) => !prof.inactive && prof.positions && /(OL|DL)/i.test(prof.positions))
    .map(([name]) => name);
  return getPRs(entries.filter(e => bigBoyNames.includes(e.athlete)), exId);
}

function buildBigBoysBoard(entries){
  const tabs = EX.map((ex, i) => {
    const rows = getBigBoys(entries, ex.id);
    return `<div>
      <div class="lb-col-head">${ex.name}</div>
      ${lbRowsEx(rows, ex.id)}
    </div>`;
  }).join('');
  return`<div class="slide slide-light" id="s8">
    ${blackBrush()}
    <img class="slide-logo" src="${LOGO}" alt="FPT" style="height:clamp(62px,24vw,500px)"/>
    <div class="lb-body">
      <div class="lb-ex-name">Big Boys<br>Board</div>
      <div class="lb-columns lb-columns-3" style="grid-template-columns:1fr 1fr 1fr">
        ${tabs}
      </div>
    </div>
  </div>`;
}

function buildMonthlyPRs(entries){
  const mon=getMonthName();
  const perExRows=EX.map(ex=>getMonthlyImprovers(entries,ex.id));
  const maxRowsInAnyCol=Math.max.apply(null,perExRows.map(r=>r.length).concat([5]));
  const rowHeightPct=(100/maxRowsInAnyCol).toFixed(2);
  function col(ex,rows){
    if(!rows.length)return`<div class="pr-empty">No PRs this month yet</div>`;
    const entriesHtml=rows.map(r=>{
      const prev=r.prev!=null?fmtScore(ex.id,r.prev):'First';
      return`<div class="pr-entry" style="height:${rowHeightPct}%">
        <span class="pr-ath-name">${r.athlete}</span>
        <span class="pr-ath-val">${prev}→${fmtScore(ex.id,r.curr)}</span>
      </div>`;
    }).join('');
    return`<div class="pr-entries-wrap">${entriesHtml}</div>`;
  }
  return`<div class="slide slide-light" id="s7">
    ${blackBrush()}
    <img class="slide-logo" src="${LOGO}" alt="FPT" style="height:clamp(84px,11.67vw,448px)"/>
    <div class="pr-body">
      <div class="pr-title">${mon}<br>Leaderboard</div>
      <div class="pr-cols">
        ${EX.map((ex,i)=>`<div class="pr-col">
          <div class="pr-col-head">${ex.name}</div>
          ${col(ex,perExRows[i])}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function buildShredmill(){
  if(!SHREDMILL_URL)return '';   // self-suppress until Chris's video is published — set SHREDMILL_URL to bring it back
  const vid=`<video src="${SHREDMILL_URL}" autoplay muted loop playsinline></video>`;

function buildCongrats(entries){
  const active=activeAchs().concat(autoAchievementsAsRecords(entries||[]));
  if(!active.length)return '';   // self-suppress when there's nothing active, same as birthdays/challenge
  const items=active.map(a=>{
    const adultRec=state.adults&&state.adults[a.athlete];
    const _anp=adultRec?_adultNameParts(a.athlete):null;
    const dispName=adultRec?(_anp.first+(a.showLastName!==false&&_anp.last?' '+_anp.last:'')):(a.showLastName===false?String(a.athlete||'').trim().split(/\s+/)[0]||a.athlete:a.athlete);
    return`<div class="cg-item"><div class="cg-name"><span>${dispName}</span></div><div class="cg-ach">${a.achievement}</div></div>`;
  }).join('');
  return`<div class="slide slide-dark" id="s9">
    ${whiteBrush()}
    <img class="slide-logo" src="${LOGO_WHITE}" alt="FPT" style="height:clamp(91px,32vw,700px)"/>
    <div class="cg-body">
      <div class="cg-word">Congrats</div>
      <div class="cg-right">${items}</div>
    </div>
  </div>`;
}

// ── BIRTHDAYS + CHALLENGE (dynamic, self-suppressing) ────────────
function _etNow(){return new Date(new Date().toLocaleString('en-US',{timeZone:'America/New_York'}));}
function _isLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}
function round3(v){return Math.round(v*1000)/1000;}
function weekRangeMonSun(){
  var now=_etNow();
  var day=now.getDay();              // 0=Sun..6=Sat
  var diffToMon=(day===0?-6:1-day);
  var mon=new Date(now.getFullYear(),now.getMonth(),now.getDate()+diffToMon);
  return {mon:mon,today:now};
}
function birthdaysThisWeek(){
  var r=weekRangeMonSun();
  var cands=[];
  var p=state.profiles||{};
  Object.keys(p).forEach(function(n){var pr=p[n];if(pr&&!pr.inactive&&pr.dob)cands.push({name:n,dob:pr.dob});});
  var ad=state.adults||{};
  Object.keys(ad).forEach(function(n){
    if(!ad[n]||!ad[n].dob)return;
    var fp=_adultNameParts(n);
    var disp=fp.first;
    cands.push({name:disp,dob:ad[n].dob});
  });
  var out=[],seen={};
  cands.forEach(function(c){
    if(seen[c.name])return;
    var parts=String(c.dob).split('-');
    var bm,bd;
    if(parts.length===3){bm=+parts[1];bd=+parts[2];}       // athlete: YYYY-MM-DD
    else if(parts.length===2){bm=+parts[0];bd=+parts[1];}  // adult: MM-DD
    else return;
    if(!bm||!bd||isNaN(bm)||isNaN(bd))return;
    for(var i=0;i<7;i++){
      var d=new Date(r.mon.getFullYear(),r.mon.getMonth(),r.mon.getDate()+i);
      var dm=d.getMonth()+1, dd=d.getDate();
      var match=(dm===bm&&dd===bd);
      // Feb 29 birthday in a non-leap year -> surface on Feb 28 (display stays Feb 29)
      if(!match && bm===2 && bd===29 && dm===2 && dd===28 && !_isLeap(d.getFullYear())) match=true;
      if(match){
        var isToday=(r.today.getMonth()===d.getMonth()&&r.today.getDate()===d.getDate());
        out.push({name:c.name,bm:bm,bd:bd,dayIndex:i,isToday:isToday});
        seen[c.name]=1;break;
      }
    }
  });
  out.sort(function(a,b){return a.dayIndex-b.dayIndex||a.name.localeCompare(b.name);});
  return out;
}
function fmtBday(bm,bd){var MN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return (MN[bm-1]||'')+' '+bd;}
function buildBirthdays(){
  var list=birthdaysThisWeek();
  if(!list.length)return '';            // self-suppress when no birthdays this week
  var items=list.map(function(b){
    return '<div class="bd-item'+(b.isToday?' bd-today':'')+'">'
      +'<span class="bd-name">'+b.name+(b.isToday?' \uD83C\uDF89':'')+'</span>'
      +'<span class="bd-date">'+fmtBday(b.bm,b.bd)+(b.isToday?' \u00B7 TODAY':'')+'</span>'
      +'</div>';
  }).join('');
  return '<div class="slide slide-dark">'+whiteBrush()
    +'<img class="slide-logo" src="'+LOGO_WHITE+'" alt="FPT" style="height:clamp(91px,16.9vw,273px)"/>'
    +'<div class="bd-body">'
    +'<div class="bd-title">Birthdays</div>'
    +'<div class="bd-sub">In the Gym This Week</div>'
    +'<div class="bd-list">'+items+'</div>'
    +'</div></div>';
}
function _adultNameParts(key){
  var a=(state.adults||{})[key]||{};
  var fn=a.firstName, ln=a.lastName;
  if(fn===undefined||fn===null||fn===''){
    var parts=String(key).trim().split(/\s+/);
    fn=parts[0]||key; ln=parts.slice(1).join(' ')||'';
  }
  if(ln===undefined||ln===null)ln='';
  return {first:fn,last:ln};
}
// Given the adult keys appearing on a slide, return {key: displayLabel} using first name,
// disambiguated by progressively longer last-name-initial prefixes only when first names collide.
function _chDisplayLabels(adultKeys){
  // Full first + last names (July 2026, per Chris/Kailey). Width-verified with real fonts
  // for 1/2/3-column layouts; .ch-name ellipsis remains the final overflow guard.
  var labels={};
  adultKeys.forEach(function(k){
    var p=_adultNameParts(k);
    labels[k]=p.first+(p.last?' '+p.last:'');
  });
  return labels;
}
function challengeLeaderboard(m,ch){
  var ents=(state.challengeEntries||[]).filter(function(e){return e.month===m;});
  var byAdult={};
  ents.forEach(function(e){(byAdult[e.adult]=byAdult[e.adult]||[]).push(e);});
  var dir=ch.betterDir||'lower';
  var rows=Object.keys(byAdult).map(function(a){
    var es=byAdult[a].slice().sort(function(x,y){return String(x.date).localeCompare(String(y.date));});
    var baseline=es[0].value, latest=es.length>1?es[es.length-1].value:null;
    var improvement=latest!=null?(dir==='higher'?latest-baseline:baseline-latest):null;
    // Rank by baseline until a 2nd entry exists, then rank by their latest (current) result
    var current=latest!=null?latest:baseline;
    return {adult:a,baseline:baseline,latest:latest,improvement:improvement,current:current};
  });
  rows.sort(function(x,y){return dir==='higher'?y.current-x.current:x.current-y.current;});
  return rows;
}
function _chColumnCount(n){
  if(n<=6)return 1;
  if(n<=12)return 2;
  return 3;
}
function buildChallengeSlide(){
  var et=_etNow();
  var mm=et.getFullYear()+'-'+String(et.getMonth()+1).padStart(2,'0');
  var ch=(state.challenges||{})[mm];
  if(!ch)return '';                     // no challenge defined this month
  var rows=challengeLeaderboard(mm,ch);
  if(!rows.length)return '';            // no results logged yet
  var monName=et.toLocaleString('en-US',{month:'long'}).toUpperCase();
  var unitSfx=ch.unit?(' '+ch.unit):'';

  // Rank the FULL list first (tie-aware), then split into columns so numbering stays continuous.
  var rankNum=1;
  var ranked=rows.map(function(r,i){
    if(i>0){var prevTied=rows[i-1].current===r.current;if(!prevTied)rankNum=i+1;}
    return {r:r,rank:rankNum};
  });

  var nCols=_chColumnCount(ranked.length);
  var perCol=Math.ceil(ranked.length/nCols);
  var cols=[];
  for(var c=0;c<nCols;c++)cols.push(ranked.slice(c*perCol,(c+1)*perCol));

  var dispLabels=_chDisplayLabels(rows.map(function(r){return r.adult;}));

  var maxRowsInAnyCol=Math.max.apply(null,cols.map(function(c){return c.length;}).concat([5]));
  var rowHeightPct=(100/maxRowsInAnyCol).toFixed(2);

  var colsHtml=cols.map(function(colRows){
    var rowsHtml=colRows.map(function(x){
      return '<div class="ch-row" style="height:'+rowHeightPct+'%">'
        +'<div class="ch-rank">'+rankStr(x.rank)+'</div>'
        +'<div class="ch-name">'+(dispLabels[x.r.adult]||x.r.adult)+'</div>'
        +'<div class="ch-score">'+round3(x.r.current)+unitSfx+'</div>'
        +'</div>';
    }).join('');
    return '<div class="ch-rows-wrap">'+rowsHtml+'</div>';
  }).join('');

  return '<div class="slide slide-light">'+blackBrush()
    +'<img class="slide-logo" src="'+LOGO+'" alt="FPT" style="height:clamp(84px,26vw,500px)"/>'
    +'<div class="lb-body">'
    +'<div class="lb-ex-name">'+monName+'<br>Challenge</div>'
    +'<div class="lb-col-head" style="font-size:clamp(16px,2.6vw,42px);margin-top:1.5vh">'+ch.name+(ch.unit?' &mdash; '+ch.unit:'')+'</div>'
    +'<div class="lb-columns ch-cols-'+nCols+'" style="grid-template-columns:repeat('+nCols+',1fr)">'
    +colsHtml
    +'</div></div></div>';
}

// ── ENGINE ───────────────────────────────────────────────────────
let current=0,timer=null;
let state={entries:[],profiles:{},achievements:[]};

async function loadData(){
  const loaded=await _apiLoad();
  if(loaded)state=loaded;
  if(!state.profiles)state.profiles={};
  if(!state.achievements)state.achievements=[];
  if(!state.schoolLogos)state.schoolLogos={};
  if(!state.adults)state.adults={};
  if(!state.challenges)state.challenges={};
  if(!state.challengeEntries)state.challengeEntries=[];
  renderBoard();
}

// Hides "one-and-done" intake-only athletes from TV leaderboards: an athlete's results
// don't appear until they've logged a 2nd DISTINCT session date (any exercise counts;
// multiple exercises logged on the same day still count as one session). Once they cross
// that threshold, ALL of their entries become eligible — including the first session's.
function _eligibleTvEntries(allEntries){
  var datesByAthlete={};
  allEntries.forEach(function(e){
    var key=e.athlete;
    if(!datesByAthlete[key])datesByAthlete[key]={};
    datesByAthlete[key][e.date]=true;
  });
  var eligible={};
  Object.keys(datesByAthlete).forEach(function(a){
    if(Object.keys(datesByAthlete[a]).length>=2)eligible[a]=true;
  });
  return allEntries.filter(function(e){return eligible[e.athlete];});
}
function renderBoard(){
  const{entries=[]}=state;
  const tvEntries=_eligibleTvEntries(entries);
  var slides=[];
  function add(html,time){if(html)slides.push({html:html,time:time});}
  add(buildWelcome(),10);
  add(buildLeaderboard(1,EX[0],'male',tvEntries),12);
  add(buildLeaderboard(2,EX[0],'female',tvEntries),12);
  add(buildLeaderboard(3,EX[1],'male',tvEntries),12);
  add(buildLeaderboard(4,EX[1],'female',tvEntries),12);
  add(buildLeaderboard(5,EX[2],'male',tvEntries),12);
  add(buildLeaderboard(6,EX[2],'female',tvEntries),12);
  add(buildMonthlyPRs(tvEntries),14);
  add(buildBigBoysBoard(tvEntries),12);
  add(buildShredmill(),11);
  add(buildBirthdays(),13);
  if(SHOW_CHALLENGE_SLIDE)add(buildChallengeSlide(),13);
  add(buildCongrats(tvEntries),13);
  TOTAL_SLIDES=slides.length;
  SLIDE_TIMES=slides.map(function(s){return s.time;});
  document.getElementById('board').innerHTML=slides.map(function(s){return s.html;}).join('');
  if(current>=TOTAL_SLIDES)current=0;
  buildDots();
  activateSlide(current);
}

function buildDots(){
  document.getElementById('dots').innerHTML=
    Array.from({length:TOTAL_SLIDES},(_,i)=>
      `<div class="nd${i===current?' on':''}" onclick="goTo(${i})"></div>`).join('');
}

function activateSlide(idx){
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.nd').forEach((d,i)=>d.classList.toggle('on',i===idx));
  startProgress(SLIDE_TIMES[idx]);
  requestAnimationFrame(_constrainLogoHeights);
  requestAnimationFrame(_fitCongratsItems);
  requestAnimationFrame(_growCongratsLogo);
}
// Congrats has no cap on simultaneous achievements (unlike the 5-max leaderboard), so text
// size is only shrunk from its big default if the actual current items would genuinely
// overflow the slide — most of the time (1-3 items) it stays at full, uncompromised size.
function _fitCongratsItems(){
  document.querySelectorAll('.slide.active .cg-right').forEach(function(container){
    var items=container.querySelectorAll('.cg-item');
    if(!items.length)return;
    var slide=container.closest('.slide');
    if(!slide)return;
    container.style.removeProperty('--cg-scale');
    var slideBox=slide.getBoundingClientRect();
    var safeTop=slideBox.top+slideBox.height*(130/1080)+15;
    var safeBottom=slideBox.top+slideBox.height*(960/1080)-15;
    var scale=1,guard=0;
    while(guard++<24){
      var first=items[0].getBoundingClientRect(),last=items[items.length-1].getBoundingClientRect();
      if(last.bottom<=safeBottom&&first.top>=safeTop)break;
      scale-=0.04;
      if(scale<0.4)break;
      container.style.setProperty('--cg-scale',scale);
    }
  });
}
// Keeps the logo's bottom edge a bit above the header divider line, whatever the actual
// rendered position of that line is on this screen — measured live, not hardcoded, so it
// stays correct regardless of title length, screen size, or row count.
function _constrainLogoHeights(){
  document.querySelectorAll('.slide.active').forEach(function(slide){
    var logo=slide.querySelector('.slide-logo');
    var divider=slide.querySelector('.lb-columns');
    if(!logo||!divider)return;
    logo.style.maxHeight='';
    var logoTop=logo.getBoundingClientRect().top;
    var dividerTop=divider.getBoundingClientRect().top;
    var margin=Math.max(10,dividerTop*0.015);
    var maxH=dividerTop-logoTop-margin;
    if(maxH>20)logo.style.maxHeight=maxH+'px';
  });
}
// Congrats has no divider line to measure against (unlike Leaderboard/BigBoys/Challenge),
// so instead of a static guess, grow the logo toward the ribbon-safe zone, then check for
// real overlap against whatever achievement items actually happen to be on screen — and
// only back off if a genuine collision is found, rather than capping it small by default.
function _growCongratsLogo(){
  document.querySelectorAll('.slide.active').forEach(function(slide){
    var logo=slide.querySelector('.slide-logo');
    var cgRight=slide.querySelector('.cg-right');
    if(!logo||!cgRight)return; // only applies to Congrats
    logo.style.maxHeight='';
    var slideBox=slide.getBoundingClientRect();
    var ribbonSafeY=slideBox.top+slideBox.height*(960/1080)-15;
    var logoTop=logo.getBoundingClientRect().top;
    var candidateMax=ribbonSafeY-logoTop;
    if(candidateMax<20)return;
    logo.style.maxHeight=candidateMax+'px';
    var canvas=document.createElement('canvas'),ctx=canvas.getContext('2d');
    function textRight(el){
      var cs=getComputedStyle(el);
      ctx.font=cs.fontWeight+' '+cs.fontSize+' '+cs.fontFamily;
      var box=el.getBoundingClientRect();
      return box.left+ctx.measureText(el.textContent).width;
    }
    var guard=0;
    while(guard++<30){
      var logoBox=logo.getBoundingClientRect();
      var items=cgRight.querySelectorAll('.cg-item');
      var overlapsAnyItem=Array.from(items).some(function(it){
        var nameSpan=it.querySelector('.cg-name span'),ach=it.querySelector('.cg-ach');
        var itemTop=it.getBoundingClientRect().top,itemBottom=it.getBoundingClientRect().bottom;
        var rightEdge=Math.max(nameSpan?textRight(nameSpan):0, ach?textRight(ach):0);
        var verticalOverlap=!(itemBottom<logoBox.top||itemTop>logoBox.bottom);
        return verticalOverlap&&rightEdge>logoBox.left;
      });
      if(!overlapsAnyItem)break;
      candidateMax-=25;
      if(candidateMax<20)break;
      logo.style.maxHeight=candidateMax+'px';
    }
  });
}

function startProgress(secs){
  const bar=document.getElementById('prog');
  bar.style.transition='none';bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition=`width ${secs}s linear`;bar.style.width='100%';
  }));
  if(timer)clearTimeout(timer);
  timer=setTimeout(next,secs*1000);
}

function next(){
  current=(current+1)%TOTAL_SLIDES;
  activateSlide(current);
  if(current===0)loadData();
}
function goTo(idx){if(timer)clearTimeout(timer);current=idx;activateSlide(current);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')next();
  if(e.key==='ArrowLeft'){if(timer)clearTimeout(timer);current=(current-1+TOTAL_SLIDES)%TOTAL_SLIDES;activateSlide(current);}
});
let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(tx===null)return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d<0?next():goTo((current-1+TOTAL_SLIDES)%TOTAL_SLIDES);}tx=null;});

// ── API ──────────────────────────────────────────────────────────
(function(){
  if(window._API_URL&&window._API_URL.startsWith('https://script.google.com')){
    localStorage.setItem('fpt_api_url',window._API_URL);return;
  }
  var stored=localStorage.getItem('fpt_api_url');
  if(stored&&stored.startsWith('https://'))window._API_URL=stored;
})();
let _saveTimer=null;
function _getApiUrl(){return window._API_URL||localStorage.getItem('fpt_api_url')||'';}
async function _apiLoad(){
  var url=_getApiUrl();if(!url)return null;
  try{var r=await fetch(url+'?t='+Date.now(),{cache:'no-store'});var j=await r.json();return j.ok?j.data:null;}
  catch(e){console.warn('FPT load:',e);return null;}
}

setInterval(loadData,60000);
loadData();

</script>
