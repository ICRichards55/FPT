<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>FPT Live Board</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Barlow+Condensed:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;overflow:hidden;font-family:'Barlow Condensed',sans-serif}
.board{width:100vw;height:100vh;position:relative}
.slide{position:absolute;inset:0;opacity:0;transition:opacity .9s ease;overflow:hidden;display:flex;flex-direction:column}
.slide.active{opacity:1}
.slide-dark{background:#111213;color:#fff}
.slide-light{background:#f4f3ef;color:#111}
svg.brush{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* LOGO — all slides: top right, below wave banner */
.slide-logo{position:absolute;z-index:10;right:3%;top:14%}
.logo-dark{height:10vh;mix-blend-mode:screen}
.logo-light{height:9vh;mix-blend-mode:multiply}
.logo-cover{height:13vh;mix-blend-mode:screen}

/* WELCOME */
.welcome-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:5vw 6vw}
.welcome-title{font-family:'Permanent Marker',cursive;font-size:clamp(68px,11vw,185px);line-height:.88;color:#fff;text-transform:uppercase;letter-spacing:-2px}
.welcome-tag-wrap{text-align:right;padding-right:2vw;margin-top:3vh}
.welcome-motto{font-family:'Permanent Marker',cursive;font-size:clamp(28px,4vw,62px);color:#fff;letter-spacing:2px;text-transform:uppercase}
.welcome-sub{font-family:'Barlow Condensed',sans-serif;font-weight:700;color:rgba(255,255,255,.65);font-size:clamp(12px,1.6vw,26px);letter-spacing:4px;text-transform:uppercase;margin-top:.8vh}

/* LEADERBOARD */
.lb-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 2.5vw}
.lb-ex-name{font-family:'Permanent Marker',cursive;font-size:clamp(60px,10.5vw,175px);line-height:.82;text-transform:uppercase;color:#111;flex-shrink:0}
.lb-columns{display:grid;grid-template-columns:1fr 1fr;gap:3vw;flex:1;padding-top:2vh;border-top:3px solid #222;margin-top:1.5vh}
.lb-col-head{font-family:'Barlow Condensed',sans-serif;font-size:clamp(14px,1.8vw,28px);font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:1.2vh;padding-bottom:.8vh;border-bottom:2px solid #ccc}
.lb-row{display:flex;align-items:center;gap:1.5vw;padding:.4vh 0;border-bottom:1px solid rgba(0,0,0,.08)}
.lb-row:last-child{border-bottom:none}
.lb-rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(24px,3.5vw,56px);min-width:clamp(48px,6vw,90px);color:#111;line-height:1}
.lb-name{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:clamp(18px,2.5vw,40px);flex:1;color:#111;line-height:1.1}
.lb-score{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:clamp(22px,3vw,48px);color:#111;line-height:1}
.lb-empty{font-size:clamp(14px,1.6vw,26px);color:#aaa;padding:2vh 0;font-style:italic}

/* MONTHLY PRS */
.pr-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 2vw}
.pr-title{font-family:'Permanent Marker',cursive;font-size:clamp(60px,9.5vw,160px);line-height:.85;text-transform:uppercase;color:#111;flex-shrink:0;margin-bottom:2vh}
.pr-cols{display:grid;grid-template-columns:repeat(3,1fr);gap:2vw;flex:1}
.pr-col{border:2.5px solid #222;border-radius:16px;padding:1.8vh 2vw;display:flex;flex-direction:column}
.pr-col-head{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,2vw,32px);font-weight:900;letter-spacing:2px;text-transform:uppercase;text-align:center;color:#111;padding-bottom:1.2vh;border-bottom:2px solid #222;margin-bottom:1.2vh;flex-shrink:0}
.pr-entry{font-family:'Barlow Condensed',sans-serif;font-size:clamp(13px,1.6vw,26px);font-weight:700;color:#111;padding:.3vh 0;border-bottom:1px solid rgba(0,0,0,.1);display:flex;justify-content:space-between;gap:1vw}
.pr-entry:last-child{border-bottom:none}
.pr-ath-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pr-ath-val{font-weight:900;white-space:nowrap;color:#333}
.pr-empty{font-size:clamp(13px,1.5vw,22px);color:#aaa;font-style:italic;padding:1vh 0}

/* SHREDMILL */
.sh-body{position:relative;z-index:2;flex:1;display:flex;align-items:stretch;padding:14vh 4vw 3vw}
.sh-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding-right:3vw}
.sh-title{font-family:'Permanent Marker',cursive;font-size:clamp(60px,9.5vw,155px);line-height:.85;text-transform:uppercase;color:#111}
.sh-right{width:42%;display:flex;flex-direction:column;gap:2vh}
.sh-vid{flex:1;background:#222;border-radius:12px;overflow:hidden;min-height:0;position:relative}
.sh-vid video{width:100%;height:100%;object-fit:cover}
.sh-vid-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:#555}
.sh-bullets{flex-shrink:0}
.sh-bullet{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.2vw,36px);font-weight:600;color:#111;padding:.4vh 0;display:flex;align-items:center;gap:12px}
.sh-bullet::before{content:'';width:10px;height:10px;border-radius:50%;background:#111;flex-shrink:0}

/* CONGRATS */
.cg-body{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;padding:14vh 4vw 3vw;overflow:visible}
.cg-word{font-family:'Permanent Marker',cursive;font-size:clamp(80px,16vw,260px);line-height:.82;color:#fff;text-transform:uppercase;white-space:nowrap;margin-left:-1vw;margin-bottom:2.5vh;flex-shrink:0}
.cg-right{flex:1;display:flex;flex-direction:column;gap:2.5vh;justify-content:center;padding-left:0.5vw}
.cg-item{border-left:4px solid #fff;padding-left:2vw}
.cg-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(18px,2.2vw,36px);color:#fff;letter-spacing:1.5px;text-transform:uppercase}
.cg-ach{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:clamp(16px,1.8vw,30px);color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.5px;text-transform:uppercase}
.cg-empty{color:rgba(255,255,255,.3);font-size:clamp(14px,1.6vw,26px);font-style:italic}

/* NAV */
.nav-dots{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:200}
.nd{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.22);transition:.3s;cursor:pointer}
.nd.on{background:rgba(255,255,255,.85)}
.prog-bar{position:fixed;bottom:0;left:0;height:3px;background:rgba(255,255,255,.5);z-index:300}
</style>
</head>

<div class="board" id="board"></div>
<div class="nav-dots" id="dots"></div>
<div class="prog-bar" id="prog"></div>

const SHREDMILL_URL='';
const SLIDE_TIMES=[10,12,12,12,12,12,12,14,12,11,13];
const TOTAL_SLIDES=11;
const EX=[
  {id:'fly',  name:'10-10 Fly',  lower:true},
  {id:'broad',name:'Broad Jump', lower:false},
  {id:'vert', name:'Skyhook Approach Jump',lower:false},
];

// ── FORMATTERS ──────────────────────────────────────────────────
function fmtFly(v){return v!=null?v.toFixed(2):'—';}
function fmtBroad(v){if(v==null)return'—';return`${Math.floor(v/12)}'${Math.round(v%12)}`;}
function fmtVert(v){return v!=null?v.toFixed(3):'—';}
function fmtScore(id,v){return id==='fly'?fmtFly(v):id==='broad'?fmtBroad(v):fmtVert(v);}
function rankStr(n){return String(n).padStart(2,'0');}
function getMonthName(){return new Date().toLocaleString('en-US',{month:'long'}).toUpperCase();}

// ── DATA — single best individual attempt ───────────────────────
function getAthletesForGender(gender){
  const p=state.profiles||{};
  return Object.entries(p)
    .filter(([_,prof])=>prof.gender===gender&&!prof.inactive)
    .map(([name])=>name);
}

function getPRs(entries,exId){
  // Single best individual attempt per athlete
  const byAth={};
  entries.filter(e=>e.exercise===exId).forEach(e=>{
    const v=exId==='broad'?e.total:e.value;
    if(v==null||isNaN(v))return;
    if(!byAth[e.athlete]||(exId==='fly'?v<byAth[e.athlete]:v>byAth[e.athlete]))
      byAth[e.athlete]=v;
  });
  return Object.entries(byAth)
    .map(([a,v])=>{return{athlete:a,v};  })
    .sort((a,b)=>exId==='fly'?a.v-b.v:b.v-a.v);
}

function getPRsGender(entries,exId,gender){
  const athletes=getAthletesForGender(gender);
  return getPRs(entries.filter(e=>athletes.includes(e.athlete)),exId);
}

function getMonthlyPRsGender(entries,exId,gender){
  const athletes=getAthletesForGender(gender);
  const ms=new Date().toISOString().slice(0,7);
  return getPRs(entries.filter(e=>athletes.includes(e.athlete)&&e.date.startsWith(ms)),exId);
}

function getMonthlyImprovers(entries,exId){
  const ms=new Date().toISOString().slice(0,7);
  const thisMonth=entries.filter(e=>e.exercise===exId&&e.date.startsWith(ms));
  const before=entries.filter(e=>e.exercise===exId&&!e.date.startsWith(ms));
  const result=[];
  [...new Set(thisMonth.map(e=>e.athlete))].forEach(ath=>{
    const mVals=thisMonth.filter(e=>e.athlete===ath).map(e=>exId==='broad'?e.total:e.value).filter(v=>v!=null);
    const bVals=before.filter(e=>e.athlete===ath).map(e=>exId==='broad'?e.total:e.value).filter(v=>v!=null);
    if(!mVals.length)return;
    const mBest=exId==='fly'?Math.min(...mVals):Math.max(...mVals);
    const bBest=bVals.length?(exId==='fly'?Math.min(...bVals):Math.max(...bVals)):null;
    if(bBest==null||(exId==='fly'?mBest<bBest:mBest>bBest))
      result.push({athlete:ath,prev:bBest,curr:mBest});
  });
  return result.sort((a,b)=>exId==='fly'?a.curr-b.curr:b.curr-a.curr);
}

function activeAchs(){
  const now=new Date();
  return(state.achievements||[]).filter(a=>{
    if(a.archived)return false;
    const exp=new Date(a.dateAdded+'T12:00:00');
    exp.setDate(exp.getDate()+a.durationWeeks*7);
    return exp>now;
  });
}

// ── SLIDE BUILDERS ───────────────────────────────────────────────
function buildWelcome(){
  return`<div class="slide slide-dark" id="s0">
    ${whiteBrush()}
    <img class="slide-logo logo-cover" src="${LOGO}" alt="FPT"/>
    <div class="welcome-body">
      <div class="welcome-title">Frye<br>Performance<br>Training</div>
      <div class="welcome-tag-wrap">
        <div class="welcome-motto">Attitude – Consistency – Effort</div>
        <div class="welcome-sub">Welcome to the best hour of your day</div>
      </div>
    </div>
  </div>`;
}

function getAthleteSchool(name){
  const p=(state.profiles||{})[name]||{};
  const today=new Date();
  if(p.hsGradYear){
    const gradDate=new Date(parseInt(p.hsGradYear),5,1);
    if(today<gradDate)return p.highSchool||'';
  }
  return p.college||p.highSchool||'';
}
function getSchoolLogo(name){
  const school=getAthleteSchool(name);
  if(!school)return null;
  return (state.schoolLogos||{})[school]||null;
}

function lbRowsEx(arr,exId){
  if(!arr.length)return`<div class="lb-empty">No entries yet</div>`;
  let rank=1,html='';
  arr.slice(0,5).forEach((r,i)=>{
    if(i>0&&arr[i].v!==arr[i-1].v)rank=i+1;
    const logo_=getSchoolLogo(r.athlete);
    html+=`<div class="lb-row">
      <div class="lb-rank">${rankStr(rank)}</div>
      <div class="lb-name" style="display:flex;align-items:center;gap:8px">${logo_?'<img src="'+logo_+'" style="height:36px;width:auto;object-fit:contain;flex-shrink:0" onerror="this.style.display=&apos;none&apos;"/>':''}<span>${r.athlete}</span></div>
      <div class="lb-score">${fmtScore(exId,r.v)}</div>
    </div>`;
  });
  return html;
}

function buildLeaderboard(slideId,ex,gender,entries){
  const monthly=getMonthlyPRsGender(entries,ex.id,gender);
  const allTime=getPRsGender(entries,ex.id,gender);
  const mon=getMonthName();
  return`<div class="slide slide-light" id="s${slideId}">
    ${blackBrush()}
    <img class="slide-logo logo-light" src="${LOGO}" alt="FPT"/>
    <div class="lb-body">
      <div class="lb-ex-name">${ex.name}</div>
      <div class="lb-columns">
        <div>
          <div class="lb-col-head">${mon} Leaderboard</div>
          ${lbRowsEx(monthly,ex.id)}
        </div>
        <div>
          <div class="lb-col-head">All-Time PR</div>
          ${lbRowsEx(allTime,ex.id)}
        </div>
      </div>
    </div>
  </div>`;
}

function getBigBoys(entries, exId){
  // Athletes with OL or DL anywhere in their positions field (case-insensitive)
  const p = state.profiles || {};
  const bigBoyNames = Object.entries(p)
    .filter(([_, prof]) => !prof.inactive && prof.positions && /(OL|DL)/i.test(prof.positions))
    .map(([name]) => name);
  return getPRs(entries.filter(e => bigBoyNames.includes(e.athlete)), exId);
}

function buildBigBoysBoard(entries){
  const tabs = EX.map((ex, i) => {
    const rows = getBigBoys(entries, ex.id);
    return `<div>
      <div class="lb-col-head">${ex.name}</div>
      ${lbRowsEx(rows, ex.id)}
    </div>`;
  }).join('');
  return`<div class="slide slide-light" id="s8">
    ${blackBrush()}
    <img class="slide-logo logo-light" src="${LOGO}" alt="FPT"/>
    <div class="lb-body">
      <div class="lb-ex-name" style="font-size:clamp(44px,7.5vw,130px)">Big Boys<br>Board</div>
      <div class="lb-columns" style="grid-template-columns:1fr 1fr 1fr">
        ${tabs}
      </div>
    </div>
  </div>`;
}

function buildMonthlyPRs(entries){
  const mon=getMonthName();
  function col(ex){
    const rows=getMonthlyImprovers(entries,ex.id);
    if(!rows.length)return`<div class="pr-empty">No PRs this month yet</div>`;
    return rows.map(r=>{
      const prev=r.prev!=null?fmtScore(ex.id,r.prev):'First';
      return`<div class="pr-entry">
        <span class="pr-ath-name">${r.athlete}</span>
        <span class="pr-ath-val">${prev}→${fmtScore(ex.id,r.curr)}</span>
      </div>`;
    }).join('');
  }
  return`<div class="slide slide-light" id="s7">
    ${blackBrush()}
    <img class="slide-logo logo-light" src="${LOGO}" alt="FPT"/>
    <div class="pr-body">
      <div class="pr-title">${mon}<br>Leaderboard</div>
      <div class="pr-cols">
        ${EX.map(ex=>`<div class="pr-col">
          <div class="pr-col-head">${ex.name}</div>
          ${col(ex)}
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

function buildShredmill(){
  const vid=SHREDMILL_URL
    ?`<video src="${SHREDMILL_URL}" autoplay muted loop playsinline></video>`
    :`<div class="sh-vid-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><span style="font-size:14px;letter-spacing:1px;margin-top:6px">VIDEO COMING SOON</span></div>`;
  return`<div class="slide slide-light" id="s8">
    ${blackBrush()}
    <img class="slide-logo logo-light" src="${LOGO}" alt="FPT"/>
    <div class="sh-body">
      <div class="sh-left"><div class="sh-title">Gear 2<br>Shredmill</div></div>
      <div class="sh-right">
        <div class="sh-vid">${vid}</div>
        <div class="sh-bullets">
          <div class="sh-bullet">Force</div>
          <div class="sh-bullet">Shapes</div>
          <div class="sh-bullet">Spacing</div>
        </div>
      </div>
    </div>
  </div>`;
}

function buildCongrats(){
  const active=activeAchs();
  const items=active.length
    ?active.map(a=>{const cgLogo=getSchoolLogo(a.athlete);return`<div class="cg-item"><div class="cg-name" style="display:flex;align-items:center;gap:8px">${cgLogo?'<img src="'+cgLogo+'" style="height:36px;width:auto;object-fit:contain;flex-shrink:0" onerror="this.style.display=\'none\'"/>':''}<span>${a.athlete}</span></div><div class="cg-ach">${a.achievement}</div></div>`;}).join('')
    :`<div class="cg-empty">Add achievements in the coaching portal</div>`;
  return`<div class="slide slide-dark" id="s9">
    ${whiteBrush()}
    <div class="cg-body">
      <div class="cg-word">Congrats</div>
      <div class="cg-right">${items}</div>
    </div>
  </div>`;
}

// ── ENGINE ───────────────────────────────────────────────────────
let current=0,timer=null;
let state={entries:[],profiles:{},achievements:[]};

async function loadData(){
  const loaded=await _apiLoad();
  if(loaded)state=loaded;
  if(!state.profiles)state.profiles={};
  if(!state.achievements)state.achievements=[];
  if(!state.schoolLogos)state.schoolLogos={};
  renderBoard();
}

function renderBoard(){
  const{entries=[]}=state;
  document.getElementById('board').innerHTML=
    buildWelcome()+
    buildLeaderboard(1,EX[0],'male',entries)+
    buildLeaderboard(2,EX[0],'female',entries)+
    buildLeaderboard(3,EX[1],'male',entries)+
    buildLeaderboard(4,EX[1],'female',entries)+
    buildLeaderboard(5,EX[2],'male',entries)+
    buildLeaderboard(6,EX[2],'female',entries)+
    buildMonthlyPRs(entries)+
    buildBigBoysBoard(entries)+
    buildShredmill()+
    buildCongrats();
  buildDots();
  activateSlide(current);
}

function buildDots(){
  document.getElementById('dots').innerHTML=
    Array.from({length:TOTAL_SLIDES},(_,i)=>
      `<div class="nd${i===current?' on':''}" onclick="goTo(${i})"></div>`).join('');
}

function activateSlide(idx){
  document.querySelectorAll('.slide').forEach((s,i)=>s.classList.toggle('active',i===idx));
  document.querySelectorAll('.nd').forEach((d,i)=>d.classList.toggle('on',i===idx));
  startProgress(SLIDE_TIMES[idx]);
}

function startProgress(secs){
  const bar=document.getElementById('prog');
  bar.style.transition='none';bar.style.width='0%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bar.style.transition=`width ${secs}s linear`;bar.style.width='100%';
  }));
  if(timer)clearTimeout(timer);
  timer=setTimeout(next,secs*1000);
}

function next(){
  current=(current+1)%TOTAL_SLIDES;
  activateSlide(current);
  if(current===0)loadData();
}
function goTo(idx){if(timer)clearTimeout(timer);current=idx;activateSlide(current);}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')next();
  if(e.key==='ArrowLeft'){if(timer)clearTimeout(timer);current=(current-1+TOTAL_SLIDES)%TOTAL_SLIDES;activateSlide(current);}
});
let tx=null;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{if(tx===null)return;const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){d<0?next():goTo((current-1+TOTAL_SLIDES)%TOTAL_SLIDES);}tx=null;});

// ── API ──────────────────────────────────────────────────────────
(function(){
  if(window._API_URL&&window._API_URL.startsWith('https://script.google.com')){
    localStorage.setItem('fpt_api_url',window._API_URL);return;
  }
  var stored=localStorage.getItem('fpt_api_url');
  if(stored&&stored.startsWith('https://'))window._API_URL=stored;
})();
let _saveTimer=null;
function _getApiUrl(){return window._API_URL||localStorage.getItem('fpt_api_url')||'';}
async function _apiLoad(){
  var url=_getApiUrl();if(!url)return null;
  try{var r=await fetch(url+'?t='+Date.now(),{cache:'no-store'});var j=await r.json();return j.ok?j.data:null;}
  catch(e){console.warn('FPT load:',e);return null;}
}

setInterval(loadData,60000);
loadData();

</script>
