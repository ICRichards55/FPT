<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>FPT Team Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090B;--surface:#0F1215;--surface2:#171B20;--surface3:#1E242B;
  --border:#252B33;--accent:#FFFFFF;--red:#FF5C35;--green:#2ECC71;
  --fly:#FF5C35;--broad:#3B9EFF;--vert:#2ECC71;
  --text:#F0F2F5;--muted:#7A8694;--muted2:#4A5260;
  --team:#e8c84a;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh}
#login-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:36px 32px;width:100%;max-width:400px;display:flex;flex-direction:column;align-items:center;gap:16px}
.login-logo{height:60px;mix-blend-mode:screen;margin-bottom:4px}
.login-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.login-sublabel{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--team);margin-top:-8px}
.login-input{width:100%;background:var(--surface3);border:1.5px solid var(--border);border-radius:8px;padding:13px 14px;color:var(--text);font-family:'Barlow',sans-serif;font-size:16px;outline:none;text-align:center;letter-spacing:4px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--team),#c9a832);color:#111;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;cursor:pointer;letter-spacing:1px;text-transform:uppercase}
.login-error{color:var(--red);font-size:12px;display:none}
.login-hint{font-size:11px;color:var(--muted2)}
#main-app{display:none}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-img{height:36px;mix-blend-mode:screen}
.header-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--team)}
.team-badge{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--team);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.team-badge.none{color:var(--muted2)}
.tab-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:12px 12px 10px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
#app{padding:16px;max-width:640px;margin:0 auto;padding-bottom:80px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.panel-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.form-input{background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-family:'Barlow',sans-serif;font-size:15px;outline:none;width:100%;transition:border-color .15s}
.form-input:focus{border-color:var(--accent)}
.toggle-group{display:flex;flex-wrap:wrap;gap:6px}
.tog{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.tog.on{background:var(--accent);border-color:var(--accent);color:#000}
.tog.team-on{background:var(--team);border-color:var(--team);color:#111}
.submit-btn{width:100%;padding:14px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;margin-top:8px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:all .15s}
.btn-accent{background:var(--accent);color:#000}
.btn-team{background:var(--team);color:#111}
.btn-ghost{background:var(--surface3);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%}
.result-field{background:var(--surface3);border:1.5px solid var(--border);border-radius:8px;padding:16px 14px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;outline:none;text-align:center;width:100%;-moz-appearance:textfield}
.result-field:focus{border-color:var(--accent)}
.result-field::-webkit-outer-spin-button,.result-field::-webkit-inner-spin-button{-webkit-appearance:none}
.ath-search-wrap{position:relative}
.ath-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface2);border:1px solid var(--border);border-radius:8px;z-index:200;max-height:200px;overflow-y:auto;margin-top:2px}
.ath-dd-item{padding:10px 14px;font-size:14px;cursor:pointer;transition:background .1s}
.ath-dd-item:hover{background:var(--surface3)}
.ath-selected{background:var(--surface3);border:1px solid var(--accent);border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.ath-name-disp{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800}
.ath-clear{background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:0 4px}
.today-row{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:6px}
.today-row-main{display:flex;justify-content:space-between;align-items:center;gap:10px}
.today-row-edit{background:var(--surface3);border-radius:7px;padding:12px;margin-top:8px;display:flex;flex-direction:column;gap:10px}
.action-btn{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.roster-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px}
.roster-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;letter-spacing:.5px}
.roster-sub{font-size:12px;color:var(--muted);margin-top:2px}
.pr-pill{display:inline-block;padding:3px 8px;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:.5px;margin:2px 2px 2px 0}
.pill-fly{background:rgba(255,92,53,.15);color:var(--fly)}
.pill-broad{background:rgba(59,158,255,.15);color:var(--broad)}
.pill-vert{background:rgba(46,204,113,.15);color:var(--vert)}
.sn-nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.sn-btn{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.sn-btn.on{background:var(--team);border-color:var(--team);color:#111}
.empty{color:var(--muted);font-size:14px;text-align:center;padding:24px 0}
.row{display:flex;gap:12px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;z-index:9998;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.team-selector-wrap{background:var(--surface2);border:1px solid var(--team);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.team-selector-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--team);margin-bottom:8px}
.team-chips{display:flex;flex-wrap:wrap;gap:6px}
.team-chip{background:var(--surface3);border:1px solid var(--border);border-radius:6px;padding:7px 14px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.team-chip.active{background:var(--team);border-color:var(--team);color:#111}
.pr-indicator{min-height:32px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-align:center}
.section-divider{height:1px;background:var(--border);margin:16px 0}
.copy-btn{background:rgba(232,200,74,.1);border:1px solid var(--team);border-radius:6px;padding:5px 10px;color:var(--team);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer}
.report-section{margin-bottom:20px}
.report-section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)}
.stat-label{font-size:13px;color:var(--muted)}
.stat-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800}
canvas{max-width:100%;border-radius:8px;margin-top:8px}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <img class="login-logo" src="/fpt_logo.webp" alt="FPT"/>
    <div class="login-label">Frye Performance Training</div>
    <div class="login-sublabel">Team Portal</div>
    <input class="login-input" id="pass-input" type="password" placeholder="••••••••••" autocomplete="off"/>
    <div class="login-error" id="login-error">Incorrect password</div>
    <button class="login-btn" id="login-btn">Enter</button>
    <div class="login-hint">Access persists for the rest of today</div>
  </div>
</div>

<div id="main-app">
  <div class="header">
    <a class="logo-wrap" href="index.html" style="text-decoration:none;color:inherit;cursor:pointer">
      <img class="logo-img" src="/fpt_logo.webp" alt="FPT"/>
      <div class="header-title">FPT Teams</div>
    </a>
    <div class="team-badge none" id="header-team-badge">No Team Selected</div>
  </div>
  <div class="tab-bar">
    <button class="tab active" id="tab-log" data-tab="log">Log</button>
    <button class="tab" id="tab-today" data-tab="today">Today</button>
    <button class="tab" id="tab-roster" data-tab="roster">Roster</button>
    <button class="tab" id="tab-ach" data-tab="ach">Achievements</button>
    <button class="tab" id="tab-studio" data-tab="studio">Studio</button>
    <button class="tab" id="tab-settings" data-tab="settings">Settings</button>
  </div>
  <div id="app"></div>
</div>

<div id="toast"></div>

<script>
var API_URL = 'https://script.google.com/macros/s/AKfycbwirWQw0-hVSwIwVl6RCWcclgRNKia7awlfUzImilUiKjNKtSapuCueOaTwWgTlJ6Uk/exec';

// ── STATE ─────────────────────────────────────────────────────────────────
var state = { teams:[], athletes:{}, profiles:{}, entries:[], achievements:[], branding:{} };
var currentTab = 'log';
var currentTeam = '';
var TODAY = (function(){
  var d = new Date();
  var et = new Date(d.toLocaleString('en-US',{timeZone:'America/New_York'}));
  return et.getFullYear()+'-'+String(et.getMonth()+1).padStart(2,'0')+'-'+String(et.getDate()).padStart(2,'0');
})();

// Log tab state
var logAthlete = '', logEx = 'fly', logDate = TODAY, logDdOpen = false;
window._athQ = '';

// Today tab state
var todayEditId = null, todayEditData = {};

// Roster state
var rosterQ = '';

// Achievements state
var achAthlete = '', achAthQ = '', achDdOpen = false, achText = '', achWeeks = 4;
var achEditId = null, achEditText = '', achEditWeeks = 4;

// Settings state
var settingsSection = 'teams';

// Branding editor state
var brandingTeam = '', brandingDraft = { logoUrl:'', palette:null }, brandingPullError = false;

// Team exercises (subset of gym)
var EX_LIST = [
  {id:'fly',   name:'10-10 Fly',   unit:'seconds', lower:true,  color:'var(--fly)'},
  {id:'broad', name:'Broad Jump',  unit:'ft + in', lower:false, color:'var(--broad)'},
  {id:'vert',  name:'Skyhook',     unit:'inches',  lower:false, color:'var(--vert)'},
];

// ── AUTH ──────────────────────────────────────────────────────────────────
function _checkPwd(v){ return v === 'FryeJump1!'; }
function _isAuthed(){ return localStorage.getItem('fpt_teams_auth_date') === TODAY; }

function tryLogin(){
  var v = (document.getElementById('pass-input').value||'').trim();
  if(_checkPwd(v)){
    localStorage.setItem('fpt_teams_auth_date', TODAY);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadData();
  } else {
    var err = document.getElementById('login-error'); err.style.display = 'block';
    var inp = document.getElementById('pass-input'); inp.style.borderColor = 'var(--red)'; inp.value = '';
    setTimeout(function(){ err.style.display='none'; inp.style.borderColor=''; }, 2500);
  }
}

// ── DELEGATED EVENTS ──────────────────────────────────────────────────────
function _handleDelegatedClick(e, prevent){
  if(!e.target) return;
  var el = e.target, id = el.id;
  if(id==='ach-save-edit-btn'){ if(prevent)e.preventDefault(); saveAchEdit(); }
  else if(id==='team-save-btn'){ if(prevent)e.preventDefault(); saveNewTeam(); }
  else if(id==='team-athlete-add-btn'){ if(prevent)e.preventDefault(); addAthleteToTeam(); }
  else if(id==='branding-pull-btn'){ if(prevent)e.preventDefault(); _pullPalette(); }
  else if(id==='branding-save-btn'){ if(prevent)e.preventDefault(); _saveBranding(); }
  else if(id==='spot-dl-btn'){ if(prevent)e.preventDefault(); _downloadSpotlight(); }
  else if(id==='report-dl-btn'){ if(prevent)e.preventDefault(); _downloadReport(); }
}
document.addEventListener('click', function(e){ _handleDelegatedClick(e,false); });
document.addEventListener('touchend', function(e){ _handleDelegatedClick(e,true); });

// ── INIT ──────────────────────────────────────────────────────────────────
(function(){
  if(_isAuthed()){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    loadData();
  }
  var lb = document.getElementById('login-btn');
  if(lb){
    lb.addEventListener('click', tryLogin);
    lb.addEventListener('touchend', function(e){ e.preventDefault(); tryLogin(); });
  }
  var pi = document.getElementById('pass-input');
  if(pi){ pi.addEventListener('keydown', function(e){ if(e.key==='Enter') tryLogin(); }); }
  document.querySelectorAll('[data-tab]').forEach(function(btn){
    var tab = btn.dataset.tab;
    btn.addEventListener('click', function(){ setTab(tab); });
    btn.addEventListener('touchend', function(e){ e.preventDefault(); setTab(tab); });
  });
})();

// ── DATA LOAD / SAVE ──────────────────────────────────────────────────────
var _loadedOK=false;
function _setLoadWarning(show){var el=document.getElementById('load-warning');if(show){if(!el){el=document.createElement('div');el.id='load-warning';el.style.cssText='position:fixed;top:0;left:0;right:0;z-index:99999;background:#b91c1c;color:#fff;padding:11px 14px;font-family:sans-serif;font-size:14px;font-weight:700;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.45)';el.innerHTML='Could not load data from the server. Do NOT add or edit anything - your changes will not save. <button onclick="loadData()" style="margin-left:10px;background:#fff;color:#b91c1c;border:none;border-radius:5px;padding:5px 14px;font-weight:800;cursor:pointer">Retry</button>';document.body.appendChild(el);}el.style.display='block';}else if(el){el.style.display='none';}}
async function loadData(){
  var gotData=false;
  try {
    var r = await fetch(API_URL + '?type=teams');
    var json = await r.json();
    if(json.ok && json.data){
      state = json.data; gotData=true;
      if(!state.teams) state.teams = [];
      if(!state.athletes) state.athletes = {};
      if(!state.profiles) state.profiles = {};
      if(!state.entries) state.entries = [];
      if(!state.achievements) state.achievements = [];
      if(!state.branding) state.branding = {};
    }
  } catch(e){ console.error('Load failed', e); }
  if(gotData){_loadedOK=true;_setLoadWarning(false);}
  else if(!_loadedOK){_setLoadWarning(true);}
  render();
}

function saveData(){
  if(!_loadedOK){_setLoadWarning(true);try{showToast('Data has not loaded yet - refresh before making changes.');}catch(e){alert('Data has not loaded yet - refresh before making changes.');}return;}
  var payload = Object.assign({ type:'teams' }, state);
  fetch(API_URL, { method:'POST', body: JSON.stringify(payload) })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(!d.ok){ console.error('Save failed', d); try{showToast('Save was rejected by the server - your change may not be stored.');}catch(e){} } })
    .catch(function(e){ console.error('Save error', e); try{showToast('Save failed - check connection and retry.');}catch(e2){} });
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function _esc(s){ return String(s).replace(/'/g,"\\'"); }
function fmtFly(v){ return v!=null ? v.toFixed(2)+'s' : '--'; }
function fmtBroad(v){ if(v==null) return '--'; return Math.floor(v/12)+"' "+Math.round(v%12)+'"'; }
function fmtVert(v){ return v!=null ? v.toFixed(3)+'"' : '--'; }
function fmtPR(id,v){ return id==='fly'?fmtFly(v):id==='broad'?fmtBroad(v):fmtVert(v); }
function fmtDate(d){ if(!d) return ''; var p=d.split('-'); var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return m[parseInt(p[1])-1]+' '+parseInt(p[2])+', '+p[0]; }
function fmtShortDate(d){ if(!d) return ''; var p=d.split('-'); return p[1].replace(/^0/,'')+'/'+p[2].replace(/^0/,'')+'/'+p[0].slice(2); }
function lastName(name){ return (name||'').split(' ').pop(); }

function getTeamAthletes(){
  if(!currentTeam) return [];
  return (state.athletes[currentTeam]||[]).slice().sort(function(a,b){ return lastName(a).localeCompare(lastName(b)); });
}

function getPR(ath, id){
  var vals = state.entries
    .filter(function(e){ return e.athlete===ath && e.exercise===id; })
    .map(function(e){ return id==='broad'?e.total:e.value; })
    .filter(function(v){ return v!=null && !isNaN(v); });
  if(!vals.length) return null;
  var lower = id==='fly';
  return lower ? Math.min.apply(null,vals) : Math.max.apply(null,vals);
}

function getPRWithDate(ath, id){
  var best=null, bestDate=null;
  state.entries.filter(function(e){ return e.athlete===ath && e.exercise===id; }).forEach(function(e){
    var v = id==='broad'?e.total:e.value; if(v==null||isNaN(v)) return;
    if(best==null||(id==='fly'?v<best:v>best)){ best=v; bestDate=e.date; }
  });
  return { pr:best, date:bestDate };
}

function showToast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

function updateHeaderBadge(){
  var el = document.getElementById('header-team-badge');
  if(!el) return;
  if(currentTeam){ el.textContent=currentTeam; el.className='team-badge'; }
  else { el.textContent='No Team Selected'; el.className='team-badge none'; }
}

// ── TAB / RENDER ──────────────────────────────────────────────────────────
function setTab(t){
  currentTab = t;
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('active'); });
  var el = document.getElementById('tab-'+t); if(el) el.classList.add('active');
  render();
}

function render(){
  updateHeaderBadge();
  var app = document.getElementById('app'); if(!app) return;
  if(currentTab==='log') app.innerHTML = renderLog();
  else if(currentTab==='today') app.innerHTML = renderToday();
  else if(currentTab==='roster') app.innerHTML = renderRoster();
  else if(currentTab==='ach') app.innerHTML = renderAch();
  else if(currentTab==='studio') app.innerHTML = renderStudio();
  else if(currentTab==='settings') app.innerHTML = renderSettings();
}

// ── TEAM SELECTOR WIDGET ──────────────────────────────────────────────────
function renderTeamSelector(){
  if(!state.teams.length){
    return '<div class="team-selector-wrap"><div class="team-selector-label">Team</div><div style="color:var(--muted);font-size:13px">No teams yet — add one in Settings.</div></div>';
  }
  var chips = state.teams.map(function(t){
    return '<button class="team-chip'+(t===currentTeam?' active':'')+'" onclick="selectTeam(\''+_esc(t)+'\')">'+t+'</button>';
  }).join('');

function updateAthDropdown(){
  var dd = document.getElementById('ath-dropdown'); if(!dd) return;
  logDdOpen = true; dd.style.display = 'block';
  var q = (window._athQ||'').toLowerCase();
  var list = getTeamAthletes().filter(function(a){ return !q||a.toLowerCase().includes(q); });
  dd.innerHTML = list.length
    ? list.map(function(a){ var safe=a.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); return '<div class="ath-dd-item" onmousedown="selectAth(\''+_esc(a)+'\')" data-n="'+safe+'">'+a+'</div>'; }).join('')
    : '<div class="ath-dd-item" style="color:var(--muted)">No matches</div>';
}

function closeAthDropdown(){
  logDdOpen = false;
  var dd = document.getElementById('ath-dropdown'); if(dd) dd.style.display = 'none';
}

function selectAth(name){
  logAthlete = name; window._athQ = ''; logDdOpen = false; render();
}

function checkPRLive(){
  var ind = document.getElementById('pr-indicator'); if(!ind||!logAthlete) return;
  var current = getPR(logAthlete, logEx);
  var newVal;
  if(logEx==='broad'){
    var ft=parseFloat((document.getElementById('res-ft')||{}).value);
    var inch=parseFloat((document.getElementById('res-in')||{}).value);
    if(isNaN(ft)||isNaN(inch)){ind.textContent='';return;}
    newVal = ft*12+inch;
  } else {
    newVal = parseFloat((document.getElementById('res-val')||{}).value);
    if(isNaN(newVal)){ind.textContent='';return;}
  }
  if(current==null){
    ind.innerHTML='<span style="color:var(--green)">✓ First entry for this exercise</span>';
  } else {
    var isPR = logEx==='fly' ? newVal<current : newVal>current;
    if(isPR){
      var diff = logEx==='fly' ? (current-newVal).toFixed(2)+'s' : logEx==='broad' ? (newVal-current).toFixed(1)+' in' : (newVal-current).toFixed(3)+'"';
      ind.innerHTML='<span style="color:var(--green)">🏆 NEW PR! +'+diff+' improvement</span>';
    } else {
      ind.innerHTML='<span style="color:var(--muted)">Current PR: '+fmtPR(logEx,current)+'</span>';
    }
  }
}

function submitEntry(){
  if(!logAthlete){ alert('Select an athlete.'); return; }
  var entry = { id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), athlete:logAthlete, exercise:logEx, date:logDate };
  if(logEx==='broad'){
    var ft=parseFloat((document.getElementById('res-ft')||{}).value);
    var inch=parseFloat((document.getElementById('res-in')||{}).value);
    if(isNaN(ft)||isNaN(inch)){ alert('Enter feet and inches.'); return; }
    entry.valueFt=Math.round(ft); entry.valueIn=Math.round(inch); entry.total=ft*12+inch;
  } else {
    var v=parseFloat((document.getElementById('res-val')||{}).value);
    if(isNaN(v)){ alert('Enter a value.'); return; }
    entry.value=v;
  }
  state.entries.push(entry);
  saveData();
  showToast('Logged!');
  logAthlete=''; window._athQ='';
  render();
}

function renderToday(){
  var teamSel = renderTeamSelector();
  if(!currentTeam) return teamSel+'<div class="panel"><div class="empty">Select a team above.</div></div>';

  var teamAthletes = getTeamAthletes();
  var today = state.entries.filter(function(e){
    return e.date===TODAY && teamAthletes.indexOf(e.athlete)>-1;
  }).slice().reverse();

  // Calculate attempt numbers per athlete+exercise

    return e.date===TODAY && teamAthletes.indexOf(e.athlete)>-1;
  });

  todayForAttempts.forEach(function(e){
    var k = e.athlete+'|'+e.exercise;

  var rows = today.map(function(e){
    var ex = EX_LIST.filter(function(x){ return x.id===e.exercise; })[0]||{name:e.exercise};
    var val = e.exercise==='broad'?fmtBroad(e.total):e.exercise==='fly'?fmtFly(e.value):fmtVert(e.value);

    var attemptLabel = '<span style="font-size:10px;color:var(--muted2);margin-left:6px">attempt '+attempt+'</span>';

      '<div style="font-size:12px;color:'+(EX_C[e.exercise]||'var(--muted)')+'">'+ex.name+attemptLabel+'</div></div>'+
      '<div style="display:flex;align-items:center;gap:8px">'+
      '<span style="font-family:\'Barlow Condensed\',sans-serif;font-weight:900;font-size:20px">'+val+'</span>'+
      '<button class="action-btn" onclick="startEditEntry(\''+e.id+'\')">Edit</button>'+
      '<button class="action-btn" style="color:var(--red)" onclick="deleteEntry(\''+e.id+'\')">Delete</button>'+
      '</div></div>';

    var editForm = '';
    if(isEditing){
      var sfx = '-'+attempt;
      var editVal = e.exercise==='broad'
        ? '<div style="display:flex;gap:6px"><input class="result-field" id="ed-ft'+sfx+'" type="number" min="0" max="15" step="1" value="'+(todayEditData.valueFt||'')+'" style="flex:1;font-size:16px"/><input class="result-field" id="ed-in'+sfx+'" type="number" min="0" max="11" step="1" value="'+(todayEditData.valueIn||'')+'" style="flex:1;font-size:16px"/></div>'
        : '<input class="result-field" id="ed-val'+sfx+'" type="number" step="0.01" value="'+(todayEditData.value||'')+'" style="width:100%;font-size:16px"/>';
      editForm = '<div class="today-row-edit">'+
        '<div class="row" style="gap:8px;align-items:flex-end">'+
        '<div class="form-group" style="flex:1"><div class="form-label">Value</div>'+editVal+'</div>'+
        '<div class="form-group"><div class="form-label">Date</div><input class="form-input" id="ed-date'+sfx+'" type="date" value="'+(todayEditData.date||TODAY)+'"/></div>'+
        '</div>'+
        '<div style="display:flex;gap:8px">'+
        '<button class="btn btn-accent" onclick="saveEditEntry(\''+sfx+'\')">Save</button>'+
        '<button class="btn btn-ghost" onclick="todayEditId=null;render()">Cancel</button>'+
        '</div></div>';
    }
    return '<div class="today-row">'+main+editForm+'</div>';
  }).join('');

  return teamSel+'<div class="panel"><div class="panel-title">Today\'s Entries ('+today.length+')</div>'+rows+'</div>';
}

function startEditEntry(id){
  var e = state.entries.filter(function(x){ return x.id===id; })[0]; if(!e) return;
  todayEditId = id;
  todayEditData = { athlete:e.athlete, exercise:e.exercise, date:e.date, value:e.value, valueFt:e.valueFt, valueIn:e.valueIn, total:e.total };
  render();
}

function saveEditEntry(sfx){
  var e = state.entries.filter(function(x){ return x.id===todayEditId; })[0]; if(!e) return;
  var newDate = (document.getElementById('ed-date'+sfx)||{}).value||e.date; e.date=newDate;
  if(e.exercise==='broad'){
    var ft=parseFloat((document.getElementById('ed-ft'+sfx)||{}).value);
    var inch=parseFloat((document.getElementById('ed-in'+sfx)||{}).value);
    if(!isNaN(ft))e.valueFt=Math.round(ft); if(!isNaN(inch))e.valueIn=Math.round(inch);
    if(!isNaN(ft)&&!isNaN(inch))e.total=ft*12+inch;
  } else {
    var v=parseFloat((document.getElementById('ed-val'+sfx)||{}).value);
    if(!isNaN(v))e.value=v;
  }
  todayEditId=null; saveData(); showToast('Entry updated!'); render();
}

function deleteEntry(id){
  if(!confirm('Delete this entry?')) return;
  state.entries = state.entries.filter(function(e){ return e.id!==id; });
  saveData(); showToast('Entry deleted.'); render();
}

function openReport(name){
  var win = window.open('','_blank');
  var entries = state.entries.filter(function(e){ return e.athlete===name; });
  if(!entries.length){ win.document.write('<p>No entries for '+name+'</p>'); return; }

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>'+name+' — FPT Report</title>';
  html += '<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;800;900&family=Barlow:wght@400;500&display=swap" rel="stylesheet"/>';
  html += '<style>body{background:#07090B;color:#F0F2F5;font-family:Barlow,sans-serif;padding:32px;max-width:700px;margin:0 auto}';
  html += 'h1{font-family:"Barlow Condensed",sans-serif;font-size:32px;font-weight:900;letter-spacing:1px;color:#fff;margin-bottom:4px}';
  html += '.sub{color:#7A8694;font-size:14px;margin-bottom:32px}';
  html += '.ex-section{margin-bottom:32px}';
  html += '.ex-title{font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;padding-bottom:6px;border-bottom:2px solid #252B33}';
  html += '.pr-val{font-family:"Barlow Condensed",sans-serif;font-size:36px;font-weight:900}';
  html += '.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}';
  html += '.stat-box{background:#0F1215;border:1px solid #252B33;border-radius:8px;padding:12px 16px}';
  html += '.stat-lbl{font-size:11px;color:#7A8694;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}';
  html += '.stat-num{font-family:"Barlow Condensed",sans-serif;font-size:24px;font-weight:900}';
  html += 'table{width:100%;border-collapse:collapse;font-size:13px}';
  html += 'th{text-align:left;color:#7A8694;font-weight:500;padding:6px 8px;border-bottom:1px solid #252B33}';
  html += 'td{padding:6px 8px;border-bottom:1px solid #0F1215}';
  html += '</style></head><body>';
  html += '<h1>'+name+'</h1>';
  html += '<div class="sub">FPT Team Training Report &nbsp;·&nbsp; Generated '+new Date().toLocaleDateString()+'</div>';

  EX_LIST.forEach(function(ex){
    var exEntries = entries.filter(function(e){ return e.exercise===ex.id; });
    if(!exEntries.length) return;
    var vals = exEntries.map(function(e){ return ex.id==='broad'?e.total:e.value; }).filter(function(v){ return v!=null&&!isNaN(v); });
    var lower = ex.id==='fly';
    var best = lower?Math.min.apply(null,vals):Math.max.apply(null,vals);
    var avg = vals.reduce(function(a,b){return a+b;},0)/vals.length;
    var sorted = exEntries.slice().sort(function(a,b){ return a.date.localeCompare(b.date); });
    var colors = {fly:'#FF5C35',broad:'#3B9EFF',vert:'#2ECC71'};

    html += '<div class="ex-section">';
    html += '<div class="ex-title" style="color:'+colors[ex.id]+'">'+ex.name+'</div>';
    html += '<div class="stat-grid">';
    html += '<div class="stat-box"><div class="stat-lbl">Best</div><div class="stat-num" style="color:'+colors[ex.id]+'">'+fmtPR(ex.id,best)+'</div></div>';
    html += '<div class="stat-box"><div class="stat-lbl">Average</div><div class="stat-num">'+fmtPR(ex.id,avg)+'</div></div>';
    html += '<div class="stat-box"><div class="stat-lbl">Attempts</div><div class="stat-num">'+vals.length+'</div></div>';
    html += '</div>';
    html += '<table><thead><tr><th>Date</th><th>Result</th></tr></thead><tbody>';
    sorted.forEach(function(e){
      var v = ex.id==='broad'?e.total:e.value;
      var isPR = v===best;
      html += '<tr><td>'+fmtDate(e.date)+'</td><td style="font-family:\'Barlow Condensed\',sans-serif;font-size:16px;font-weight:800'+(isPR?';color:'+colors[ex.id]:'')+'">'+fmtPR(ex.id,v)+(isPR?' ★':'')+'</td></tr>';
    });
    html += '</tbody></table></div>';
  });

  html += '</body></html>';
  win.document.write(html);
  win.document.close();
}

function copyToGym(name){
  if(!confirm('Copy '+name+' to the gym portal? This is a one-time snapshot — their current entries and profile will be added to the gym roster.')){return;}
  fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ action:'copyAthleteToGym', athleteName:name })
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.ok){
      showToast(name+' copied to gym ('+d.entriesCopied+' entries)');
    } else {
      alert('Copy failed: '+(d.error||'unknown error'));
    }
  })
  .catch(function(){ alert('Network error. Try again.'); });
}

function _teamBrand(){

    logoUrl: b.logoUrl || '',
    palette: b.palette || { accent:'#C8102E', text:'#F2F2F2', background:'#0A0A0A' }
  };
}
function _lum(hex){
  hex = (hex||'#000000').replace('#','');
  if(hex.length===3) hex = hex.split('').map(function(c){ return c+c; }).join('');
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  return 0.299*r + 0.587*g + 0.114*b;
}
function _hexA(hex, a){
  hex = (hex||'#000000').replace('#','');
  if(hex.length===3) hex = hex.split('').map(function(c){ return c+c; }).join('');
  var r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function _fptLogoFor(bg){ return _lum(bg) < 140 ? '/fpt_logo.webp' : '/fpt_logo_dark.png'; }

// intake-day best (direction-aware) and best-to-best improvement %
function getIntakeBest(ath, id){
  var ents = state.entries.filter(function(e){ return e.athlete===ath && e.exercise===id; });
  if(!ents.length) return null;
  var firstDate = ents.map(function(e){ return e.date; }).sort()[0];
  var vals = ents.filter(function(e){ return e.date===firstDate; })
                 .map(function(e){ return id==='broad'?e.total:e.value; })
                 .filter(function(v){ return v!=null && !isNaN(v); });
  if(!vals.length) return null;
  return id==='fly' ? Math.min.apply(null,vals) : Math.max.apply(null,vals);
}
function getImprovementPct(ath, id){
  var intake = getIntakeBest(ath,id), best = getPR(ath,id);
  if(intake==null || best==null || intake===0) return null;
  return id==='fly' ? (intake-best)/intake*100 : (best-intake)/intake*100;
}
function _spotVal(id, v){
  if(v==null || isNaN(v)) return '--';
  if(id==='broad') return Math.floor(v/12)+"'"+Math.round(v%12);
  if(id==='fly')   return v.toFixed(2);
  return String(parseFloat(v.toFixed(1)));
}

function _spotBoxes(ath, P){
  var muted = _hexA(P.text, 0.55);
  var defs = [
    ['broad','Broad Jump Best','Broad Increase'],
    ['fly','10-10 Fly Best','Fly Improvement'],
    ['vert','Skyhook Best','Skyhook Increase']
  ];
  var html = '';
  defs.forEach(function(d){
    var id=d[0];
    var best = _spotVal(id, getPR(ath,id));
    var imp = getImprovementPct(ath,id);
    var impStr = (imp==null) ? '--' : (imp>=0?'+':'')+Math.round(imp)+'%';
    [[d[1],best],[d[2],impStr]].forEach(function(pair){
      html += '<div style="border:1.5px solid '+P.accent+';padding:7px 9px;background:'+_hexA('#000000',0.30)+'">'+
        '<div style="color:'+muted+';font-size:8px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:2px">'+pair[0]+'</div>'+
        '<div style="color:'+P.text+';font-size:28px;font-weight:900;line-height:1;letter-spacing:-1px">'+pair[1]+'</div></div>';
    });
  });
  return html;
}

function _fitSpotName(){
  var fn=document.querySelector('[data-spotname=fn]'), ln=document.querySelector('[data-spotname=ln]');
  if(!fn||!ln) return;
  var w = fn.parentElement.clientWidth, s = 90;
  function set(v){ fn.style.fontSize=v+'px'; ln.style.fontSize=v+'px'; }
  set(s);
  while(s>30 && (fn.scrollWidth>w || ln.scrollWidth>w)){ s-=1; set(s); }
}
function _fitSpotStage(){
  var wrap=document.getElementById('spot-stage-wrap'), sc=document.getElementById('spot-stage-scale');
  if(!wrap||!sc) return;
  var card=sc.firstElementChild; if(!card) return;
  var cw=card.offsetWidth||540, ch=card.offsetHeight||540;
  var k = Math.min(1, wrap.clientWidth/cw);
  sc.style.transform='scale('+k+')';
  wrap.style.height=(ch*k)+'px';
}
function _scheduleStudioFit(){
  setTimeout(function(){ _fitSpotName(); _fitSpotStage(); }, 30);
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ _fitSpotName(); _fitSpotStage(); }); }
}

function _reportDates(){
  var seen={}; state.entries.forEach(function(e){ if(e.athlete && (state.athletes[currentTeam]||[]).indexOf(e.athlete)>-1 && e.date) seen[e.date]=1; });
  var arr=Object.keys(seen).sort();
  return { intake:arr[0]||null, retest:arr[arr.length-1]||null, count:arr.length };
}
function _teamReportData(){
  var roster=state.athletes[currentTeam]||[];
  var out={};
  ['broad','fly','vert'].forEach(function(id){
    var rows=[];
    roster.forEach(function(ath){
      var imp=getImprovementPct(ath,id);
      if(imp==null) return;
      rows.push({ath:ath, imp:imp});
    });
    var n=rows.length;
    out[id]={
      avg: n? rows.reduce(function(s,r){return s+r.imp;},0)/n : 0,
      prd: rows.filter(function(r){return r.imp>0;}).length,
      n: n,
      top5: rows.slice().sort(function(a,b){return b.imp-a.imp;}).slice(0,5)
    };
  });
  return out;
}

}

    html += '<button class="btn btn-team" id="report-dl-btn" style="width:100%">Download Team Report (1080×1350)</button>';
    html += '</div>';

    return html;
  }

  // ── Spotlight ──
  if(!roster.length){
    html += '<div class="empty" style="padding:16px 0">No athletes on this team yet.</div></div>';
    return html;
  }
  html += '<div class="form-group"><div class="form-label">Athlete</div><select class="form-input" onchange="_setStudioAthlete(this.value)">';
  roster.forEach(function(a){ html += '<option value="'+esc(a)+'"'+(a===studioAthlete?' selected':'')+'>'+a+'</option>'; });
  html += '</select></div>';

  html += '<div class="form-group"><div class="form-label">Layout</div>'+
    '<div style="display:flex;gap:8px">'+

    '</div>';
  html += '<button class="btn btn-team" id="spot-dl-btn" style="width:100%">Download Spotlight (1080×1080)</button>';

// ── Settings — Branding ───────────────────────────────────────────────────
function _selectBrandingTeam(t){
  brandingTeam = t;
  var b = (state.branding && state.branding[t]) || {};
  brandingDraft = { logoUrl: b.logoUrl||'', palette: b.palette ? Object.assign({}, b.palette) : null };
  brandingPullError = false;
  render();
}

function _paletteFromImage(img){
  var c = document.createElement('canvas'); c.width = 80; c.height = 80;
  var ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, 80, 80);
  var data = ctx.getImageData(0, 0, 80, 80).data; // throws if CORS-tainted
  var buckets = {};
  for(var i=0;i<data.length;i+=4){
    if(data[i+3] < 128) continue;
    var r = data[i] & 0xE0, g = data[i+1] & 0xE0, b = data[i+2] & 0xE0;
    var key = r+'_'+g+'_'+b;
    if(!buckets[key]) buckets[key] = { r:r, g:g, b:b, n:0 };
    buckets[key].n++;
  }
  var arr = Object.keys(buckets).map(function(k){ return buckets[k]; });
  if(!arr.length) throw new Error('empty');
  function lum(x){ return 0.299*x.r + 0.587*x.g + 0.114*x.b; }
  function sat(x){ var mx=Math.max(x.r,x.g,x.b), mn=Math.min(x.r,x.g,x.b); return mx===0?0:(mx-mn)/mx; }
  function hx(x){ return '#'+[x.r,x.g,x.b].map(function(v){ return ('0'+v.toString(16)).slice(-2); }).join(''); }
  var accent = arr.slice().sort(function(a,b){ return (sat(b)*Math.min(b.n,300)) - (sat(a)*Math.min(a.n,300)); })[0];
  var background = arr.slice().sort(function(a,b){ return lum(a) - lum(b); })[0];
  var text = arr.slice().sort(function(a,b){ return lum(b) - lum(a); })[0];
  return { accent: hx(accent), text: hx(text), background: hx(background) };
}

function _pullPalette(){
  var url = (brandingDraft.logoUrl||'').trim();
  if(!url){ alert('Enter a logo URL first.'); return; }
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    try {
      brandingDraft.palette = _paletteFromImage(img);
      brandingPullError = false; render();
      showToast('Palette pulled — confirm, swap, or nudge below.');
    } catch(err){ brandingPullError = true; render(); }
  };
  img.onerror = function(){ brandingPullError = true; render(); };
  img.src = url;
}

function _onBrandingFile(input){
  var f = input.files && input.files[0]; if(!f) return;
  var rd = new FileReader();
  rd.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      try {
        brandingDraft.palette = _paletteFromImage(img);
        brandingPullError = false; render();
        showToast('Palette pulled from image.');
      } catch(e){ alert('Could not read colors from that image.'); }
    };
    img.src = ev.target.result;
  };
  rd.readAsDataURL(f);
}

function _onBrandingLogoFile(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(ev){
    brandingDraft.logoUrl=ev.target.result; // store as data URL: always displays + downloads, no CORS
    var img=new Image();
    img.onload=function(){ try{ brandingDraft.palette=_paletteFromImage(img); }catch(e){} brandingPullError=false; render(); showToast('Logo loaded \u2014 palette pulled.'); };
    img.onerror=function(){ render(); showToast('Logo loaded.'); };
    img.src=ev.target.result;
  };
  rd.readAsDataURL(f);
}

function _updatePalettePreview(){
  if(!brandingDraft.palette) return;
  var p = brandingDraft.palette;
  ['accent','text','background'].forEach(function(k){
    var el = document.getElementById('hex-'+k); if(el) el.textContent = p[k];
  });
  var pv = document.getElementById('palette-preview');
  if(pv) pv.style.background = p.background;
  var nm = document.getElementById('pp-name'); if(nm) nm.style.color = p.accent;
  var tx = document.getElementById('pp-text'); if(tx) tx.style.color = p.text;
}

function _assignRole(role, color){
  if(!brandingDraft.palette) return;
  var p = brandingDraft.palette;
  if((p[role]||'').toLowerCase() === color.toLowerCase()) return;
  var other = ['accent','text','background'].filter(function(r){ return r!==role && (p[r]||'').toLowerCase()===color.toLowerCase(); })[0];
  var old = p[role];
  p[role] = color;
  if(other) p[other] = old; // swap so all three colors stay assigned
  render();
}

function _saveBranding(){
  if(!brandingTeam){ alert('Pick a team.'); return; }
  if(!(brandingDraft.logoUrl||'').trim()){ alert('Enter a logo URL.'); return; }
  if(!brandingDraft.palette){ alert('Pull a palette first.'); return; }
  if(!state.branding) state.branding = {};
  state.branding[brandingTeam] = {
    logoUrl: brandingDraft.logoUrl.trim(),
    palette: { accent: brandingDraft.palette.accent, text: brandingDraft.palette.text, background: brandingDraft.palette.background }
  };
  saveData(); showToast('Branding saved for '+brandingTeam); render();
}

function renderSettingsBranding(){
  if(!state.teams.length){
    return '<div class="panel"><div class="panel-title">Team Branding</div><div class="empty" style="padding:16px 0">Add a team first (Teams tab).</div></div>';
  }
  if(!brandingTeam || state.teams.indexOf(brandingTeam) < 0){
    brandingTeam = (currentTeam && state.teams.indexOf(currentTeam) > -1) ? currentTeam : state.teams[0];
    var b0 = (state.branding && state.branding[brandingTeam]) || {};
    brandingDraft = { logoUrl: b0.logoUrl||'', palette: b0.palette ? Object.assign({}, b0.palette) : null };
  }
  var esc = function(s){ return String(s||'').replace(/"/g,'&quot;'); };
  var html = '<div class="panel"><div class="panel-title">Team Branding</div>';

  html += '<div class="form-group"><div class="form-label">Team</div>'+
    '<select class="form-input" onchange="_selectBrandingTeam(this.value)">';
  state.teams.forEach(function(t){
    var done = (state.branding && state.branding[t]) ? '  \u2713' : '';
    html += '<option value="'+esc(t)+'"'+(t===brandingTeam?' selected':'')+'>'+t+done+'</option>';
  });
  html += '</select></div>';

  html += '<div class="form-group"><div class="form-label">Team logo</div>'+
    '<input type="file" accept="image/*" style="width:100%;font-size:12px" onchange="_onBrandingLogoFile(this)"/>'+
    '<div style="font-size:11px;color:var(--muted);margin-top:5px;line-height:1.4">Uploading the image file is the reliable option — it always shows and downloads. Or paste a direct image URL below.</div></div>';
  var _isData=(brandingDraft.logoUrl||'').indexOf('data:')===0;
  html += '<div class="form-group"><div class="form-label">…or logo URL</div>'+
    '<input class="form-input" id="branding-logo-input" placeholder="https://…/logo.png" value="'+esc(_isData?'':brandingDraft.logoUrl)+'" oninput="brandingDraft.logoUrl=this.value" onchange="render()"/>'+
    (_isData?'<div style="font-size:11px;color:var(--muted);margin-top:4px">Currently using your uploaded image.</div>':'')+'</div>';

  html += '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">'+
    '<div style="width:64px;height:64px;border:1px solid var(--border);border-radius:8px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">'+
    ((brandingDraft.logoUrl||'').trim() ? '<img src="'+esc(brandingDraft.logoUrl)+'" crossorigin="anonymous" style="max-width:100%;max-height:100%;object-fit:contain" onerror="this.style.opacity=0"/>' : '<span style="color:var(--muted);font-size:9px;letter-spacing:1px">LOGO</span>')+
    '</div>'+
    '<button class="btn btn-team" id="branding-pull-btn" style="flex:1">Pull colors from logo</button></div>';

  if(brandingPullError){
    html += '<div style="background:#241313;border:1px solid var(--red);border-radius:8px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:var(--text)">'+
      'That logo host blocked color reading. Drop the image file here to sample its colors (used only to read colors, not stored — the URL above still renders the logo):'+
      '<input type="file" accept="image/*" style="margin-top:8px;width:100%;font-size:12px" onchange="_onBrandingFile(this)"/></div>';
  }

  if(brandingDraft.palette){
    var p = brandingDraft.palette;
    var pool = [];
    [p.accent, p.text, p.background].forEach(function(c){ if(c && pool.indexOf(c)<0) pool.push(c); });
    var roles = [['accent','Accent (loud)'],['text','Text'],['background','Background']];
    html += '<div class="form-label">Palette — tap a swatch to move a color between roles, or nudge</div>'+
      '<div style="display:flex;flex-direction:column;gap:13px;margin:6px 0 14px">';
    roles.forEach(function(r){
      var k = r[0], v = brandingDraft.palette[k]||'#000000';
      var swatches = pool.map(function(c){
        var sel = (c.toLowerCase()===v.toLowerCase());
        return '<button onclick="_assignRole(\''+k+'\',\''+c+'\')" title="'+c+'" style="width:32px;height:32px;border-radius:7px;background:'+c+';cursor:pointer;padding:0;border:'+(sel?'3px solid var(--text)':'1px solid var(--border)')+'"></button>';
      }).join('');
      html += '<div>'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">'+
          '<span style="font-size:13px;font-weight:700">'+r[1]+'</span>'+
          '<span style="display:flex;align-items:center;gap:9px">'+
            '<span style="font-size:12px;color:var(--muted);font-family:monospace" id="hex-'+k+'">'+v+'</span>'+
            '<input type="color" value="'+v+'" oninput="brandingDraft.palette.'+k+'=this.value;_updatePalettePreview()" onchange="render()" title="Nudge" style="width:38px;height:28px;border:1px solid var(--border);border-radius:6px;background:none;padding:2px;cursor:pointer"/>'+
          '</span>'+
        '</div>'+
        '<div style="display:flex;gap:8px">'+swatches+'</div>'+
      '</div>';
    });
    html += '</div>';

    html += '<div id="palette-preview" style="border-radius:8px;padding:16px;margin-bottom:14px;border:1px solid var(--border);background:'+p.background+'">'+
      '<div id="pp-name" style="font-weight:900;font-size:19px;letter-spacing:1px;text-transform:uppercase;color:'+p.accent+'">'+brandingTeam+'</div>'+
      '<div id="pp-text" style="font-size:13px;margin-top:3px;color:'+p.text+'">Sample — this is how the graphics will be themed</div></div>';

    html += '<button class="btn btn-team" id="branding-save-btn" style="width:100%">Save Branding</button>';
  }

  html += '</div>';
  return html;
}

// Settings — Athletes
var newAthName = '', newAthTeam = '', newAthGender = 'male', newAthSports = '';
function renderSettingsAthletes(){
  var teamOpts = state.teams.map(function(t){
    return '<option value="'+t.replace(/"/g,'&quot;')+'"'+(newAthTeam===t?' selected':'')+'>'+t+'</option>';
  }).join('');

  var html = '<div class="panel"><div class="panel-title">Add Athlete</div>'+
    '<div class="form-group"><div class="form-label">Full Name</div><input class="form-input" id="new-ath-name" placeholder="First Last" value="'+newAthName.replace(/"/g,'&quot;')+'" oninput="newAthName=this.value"/></div>'+
    '<div class="form-group"><div class="form-label">Team</div><select class="form-input" onchange="newAthTeam=this.value"><option value="">-- Select Team --</option>'+teamOpts+'</select></div>'+
    '<div class="form-group"><div class="form-label">Gender</div><div class="toggle-group">'+
    '<button class="tog'+(newAthGender==='male'?' on':'')+'" onclick="newAthGender=\'male\';render()">Male</button>'+
    '<button class="tog'+(newAthGender==='female'?' on':'')+'" onclick="newAthGender=\'female\';render()">Female</button>'+
    '</div></div>'+
    '<div class="form-group"><div class="form-label">Sport(s)</div><input class="form-input" placeholder="e.g. Volleyball" value="'+newAthSports.replace(/"/g,'&quot;')+'" oninput="newAthSports=this.value"/></div>'+
    '<button class="btn btn-team" id="team-athlete-add-btn" style="width:100%;margin-top:4px">Add Athlete</button></div>';

  // Existing athletes by team
  state.teams.forEach(function(t){
    var athletes = (state.athletes[t]||[]).slice().sort(function(a,b){ return lastName(a).localeCompare(lastName(b)); });
    if(!athletes.length) return;
    html += '<div class="panel"><div class="panel-title" style="font-size:13px;color:var(--team)">'+t+'</div>';
    athletes.forEach(function(name){
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">'+
        '<div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:700;font-size:15px">'+name+'</div>'+
        '<button class="action-btn" style="color:var(--red)" onclick="removeAthleteFromTeam(\''+_esc(t)+'\',\''+_esc(name)+'\')">Remove</button>'+
        '</div>';
    });
    html += '</div>';
  });

  return html;
}

function addAthleteToTeam(){
  var name = newAthName.trim();
  if(!name||!newAthTeam){ alert('Enter athlete name and select a team.'); return; }
  if(!state.athletes[newAthTeam]) state.athletes[newAthTeam]=[];
  if(state.athletes[newAthTeam].indexOf(name)>-1){ alert('Athlete already on this team.'); return; }
  state.athletes[newAthTeam].push(name);
  if(!state.profiles[name]) state.profiles[name]={};
  state.profiles[name].gender = newAthGender;
  if(newAthSports) state.profiles[name].sports = newAthSports;
  newAthName=''; newAthSports='';
  saveData(); showToast(name+' added to '+newAthTeam+'!'); render();
}

function removeAthleteFromTeam(team, name){
  if(!confirm('Remove '+name+' from '+team+'? Their entries will not be deleted.')){ return; }
  state.athletes[team] = (state.athletes[team]||[]).filter(function(a){ return a!==name; });
  saveData(); showToast('Removed from team.'); render();
}

// Settings — Copy to Gym
function renderSettingsCopyToGym(){
  var html = '<div class="panel"><div class="panel-title">Copy Athlete to Gym</div>';
  html += '<p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:16px">Promote a team athlete to the gym portal. This is a one-time snapshot — their profile and all entries are copied to the gym roster. The team record stays intact.</p>';

  var allAthletes = [];
  state.teams.forEach(function(t){
    (state.athletes[t]||[]).forEach(function(name){
      if(allAthletes.indexOf(name)===-1) allAthletes.push(name);
    });
  });
  allAthletes.sort(function(a,b){ return lastName(a).localeCompare(lastName(b)); });

  if(!allAthletes.length){
    html += '<div class="empty">No athletes yet.</div>';
  } else {
    allAthletes.forEach(function(name){
      var entryCount = state.entries.filter(function(e){ return e.athlete===name; }).length;
      html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">'+
        '<div><div style="font-family:\'Barlow Condensed\',sans-serif;font-weight:800;font-size:15px">'+name+'</div>'+
        '<div style="font-size:12px;color:var(--muted)">'+entryCount+' entries</div></div>'+
        '<button class="copy-btn" onclick="copyToGym(\''+_esc(name)+'\')">Copy to Gym</button>'+
        '</div>';
    });
  }
  html += '</div>';
  return html;
}

// Settings — Backup
function renderSettingsBackup(){
  return '<div class="panel"><div class="panel-title">Backup & Restore</div>'+
    '<div style="display:flex;flex-direction:column;gap:20px">'+
    '<div><div class="form-label" style="margin-bottom:6px">Download Backup</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Exports all team data as a JSON file.</div>'+
    '<button class="btn btn-team" onclick="downloadBackup()">Download Backup</button></div>'+
    '<div style="border-top:1px solid var(--border);padding-top:16px">'+
    '<div class="form-label" style="margin-bottom:6px">Restore from Backup</div>'+
    '<div style="font-size:12px;color:var(--muted);margin-bottom:12px">Upload a backup JSON. <strong style="color:var(--red)">This overwrites all current team data.</strong></div>'+
    '<label class="btn btn-ghost" style="cursor:pointer">Choose File<input type="file" accept=".json" style="display:none" onchange="restoreBackup(this)"/></label>'+
    '</div></div></div>';
}

function downloadBackup(){
  var blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'FPT_Teams_Backup_'+TODAY+'.json';
  a.click();
}

function restoreBackup(input){
  var file = input.files[0]; if(!file) return;
  if(!confirm('Restore from this file? All current team data will be overwritten.')) return;
  var reader = new FileReader();
  reader.onload = function(e){
    try{
      var data = JSON.parse(e.target.result);
      if(!data.teams){ alert('Invalid backup file.'); return; }
      state = data;
      saveData(); showToast('Backup restored!'); render();
    } catch(err){ alert('Could not parse backup file.'); }
  };
  reader.readAsText(file);
}
</script>
